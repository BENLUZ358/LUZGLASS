<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuzGlass — לוגו</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Heebo:wght@300;400;700;900&family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: 'Heebo', sans-serif;
    color: #fff;
    padding: 60px 40px;
  }
  h1 { text-align: center; font-size: 14px; letter-spacing: 0.3em; color: #666; text-transform: uppercase; margin-bottom: 60px; }

  .logos-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3px;
    max-width: 900px;
    margin: 0 auto;
  }

  .logo-card {
    padding: 70px 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .logo-card-label {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── VERSION A — Dark bg, gold diamond icon ── */
  .card-a { background: #0a0a0a; border: 1px solid #1e1e1e; }
  .logo-a {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-a .icon-a {
    width: 44px;
    height: 44px;
    position: relative;
    flex-shrink: 0;
  }
  .logo-a .icon-a svg { width: 100%; height: 100%; }
  .logo-a .wordmark-a {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .logo-a .luz-a {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #c9a84c;
  }
  .logo-a .glass-a {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.45em;
    color: #555;
    margin-top: 2px;
  }

  /* ── VERSION B — White bg, minimal ── */
  .card-b { background: #f5f2ed; }
  .logo-b {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .logo-b .main-b {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #111;
    line-height: 1;
  }
  .logo-b .main-b span { color: #c9a84c; }
  .logo-b .sub-b {
    font-family: 'Heebo', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.5em;
    color: #999;
    text-transform: uppercase;
  }

  /* ── VERSION C — Geometric hexagon ── */
  .card-c { background: #111; }
  .logo-c {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .hex-c {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }
  .text-c { display: flex; flex-direction: column; }
  .luz-c {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 0.9;
  }
  .glass-c {
    font-family: 'Heebo', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.55em;
    color: #c9a84c;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── VERSION D — All light, refined ── */
  .card-d { background: #1a1714; }
  .logo-d {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .line-d {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dash-d {
    width: 30px;
    height: 1px;
    background: #c9a84c;
  }
  .tagline-d {
    font-family: 'Heebo', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: #666;
    text-transform: uppercase;
  }
  .main-d {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #e8ddc8;
    line-height: 1;
  }
  .main-d em {
    font-style: normal;
    color: #c9a84c;
  }

  /* dark bg cards need light label */
  .card-a .logo-card-label,
  .card-c .logo-card-label,
  .card-d .logo-card-label { color: #333; }
  .card-b .logo-card-label { color: #bbb; }

  /* DARK VERSIONS ROW */
  .dark-row {
    max-width: 900px;
    margin: 3px auto 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3px;
  }

  .note {
    text-align: center;
    margin-top: 48px;
    font-size: 13px;
    color: #444;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<h1>LuzGlass — אפשרויות לוגו</h1>

<div class="logos-grid">

  <!-- A: Elegant serif + gold -->
  <div class="logo-card card-a">
    <div class="logo-a">
      <div class="icon-a">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Diamond shape -->
          <polygon points="22,2 42,22 22,42 2,22" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
          <!-- Inner diamond -->
          <polygon points="22,10 34,22 22,34 10,22" fill="rgba(201,168,76,0.08)" stroke="#c9a84c" stroke-width="0.6" opacity="0.6"/>
          <!-- Center dot -->
          <circle cx="22" cy="22" r="2.5" fill="#c9a84c"/>
          <!-- Shine lines -->
          <line x1="22" y1="2" x2="22" y2="10" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>
          <line x1="42" y1="22" x2="34" y2="22" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>
        </svg>
      </div>
      <div class="wordmark-a">
        <span class="luz-a">Luz</span>
        <span class="glass-a">G L A S S</span>
      </div>
    </div>
    <div class="logo-card-label">A — אלגנטי</div>
  </div>

  <!-- B: Bold Playfair on light -->
  <div class="logo-card card-b">
    <div class="logo-b">
      <div class="main-b">Luz<span>Glass</span></div>
      <div class="sub-b">מפעל עיבוד זכוכית</div>
    </div>
    <div class="logo-card-label">B — בולד על בהיר</div>
  </div>

  <!-- C: Geometric hex + Bebas -->
  <div class="logo-card card-c">
    <div class="logo-c">
      <svg class="hex-c" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Hexagon -->
        <polygon points="28,3 51,16 51,40 28,53 5,40 5,16" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
        <!-- Inner hex -->
        <polygon points="28,11 44,20 44,36 28,45 12,36 12,20" fill="rgba(201,168,76,0.06)" stroke="#c9a84c" stroke-width="0.6" opacity="0.5"/>
        <!-- Glass refraction lines -->
        <line x1="28" y1="3" x2="28" y2="53" stroke="rgba(201,168,76,0.15)" stroke-width="0.8"/>
        <line x1="5" y1="16" x2="51" y2="40" stroke="rgba(201,168,76,0.15)" stroke-width="0.8"/>
        <line x1="51" y1="16" x2="5" y2="40" stroke="rgba(201,168,76,0.15)" stroke-width="0.8"/>
        <!-- Center -->
        <circle cx="28" cy="28" r="3" fill="#c9a84c" opacity="0.9"/>
      </svg>
      <div class="text-c">
        <span class="luz-c">LUZ</span>
        <span class="glass-c">G L A S S</span>
      </div>
    </div>
    <div class="logo-card-label">C — גיאומטרי</div>
  </div>

  <!-- D: Cormorant full word -->
  <div class="logo-card card-d">
    <div class="logo-d">
      <div class="line-d">
        <div class="dash-d"></div>
        <div class="tagline-d">מפעל עיבוד זכוכית</div>
        <div class="dash-d"></div>
      </div>
      <div class="main-d">Luz<em>Glass</em></div>
      <div class="line-d">
        <div class="dash-d"></div>
        <div class="tagline-d" style="color:#c9a84c; letter-spacing:0.3em;">since 2010</div>
        <div class="dash-d"></div>
      </div>
    </div>
    <div class="logo-card-label">D — קלאסי יוקרתי</div>
  </div>

</div>

<p class="note">לחץ על גרסה מועדפת — נוכל לשלב אותה באתר ולחדד את הפרטים</p>

</body>
</html>
