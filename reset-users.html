<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuzGlass — איפוס משתמשים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:Heebo,sans-serif;direction:rtl;background:#1a1714;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:30px 20px;}
  .card{background:#242424;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:32px 28px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .logo{font-size:20px;font-weight:900;color:#f7f4ef;margin-bottom:4px;}
  .logo span{color:#b8922a;}
  .sub{font-size:11px;color:#555;margin-bottom:24px;letter-spacing:0.08em;}
  h3{font-size:11px;font-weight:700;color:#b8922a;margin:18px 0 10px;letter-spacing:0.1em;text-transform:uppercase;}
  .ublock{background:rgba(184,146,42,0.07);border:1px solid rgba(184,146,42,0.2);border-radius:6px;padding:11px 14px;margin-bottom:8px;font-size:12px;color:#ccc;line-height:1.8;}
  .ublock .role{font-size:10px;color:#b8922a;font-weight:700;}
  .btn{width:100%;padding:13px;font-family:Heebo,sans-serif;font-size:14px;font-weight:900;border:none;cursor:pointer;border-radius:6px;margin-top:10px;}
  .btn-go{background:#e74c3c;color:#fff;}
  .btn-go:disabled{background:#444;cursor:not-allowed;}
  .btn-login{background:#27ae60;color:#fff;}
  .log{margin-top:16px;font-size:12px;line-height:2;display:none;}
  .ok{color:#27ae60;} .err{color:#e74c3c;font-weight:700;} .info{color:#b8922a;} .data{color:#888;font-family:monospace;font-size:11px;}
  .done{display:none;margin-top:16px;background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:8px;padding:18px;text-align:center;color:#27ae60;font-size:13px;line-height:2;}
  .sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Luz<span>Glass</span></div>
  <div class="sub">כלי פנימי — איפוס משתמשים</div>

  <h3>⚠️ פעולה זו תמחק את כל המשתמשים ותשאיר:</h3>

  <div class="ublock">
    <div class="role">ADMIN MAIN</div>
    שם: בן לוז &nbsp;|&nbsp; טלפון: 0547725552 &nbsp;|&nbsp; סיסמה: 781578
  </div>

  <div id="extraUsersBlock"></div>

  <button class="btn btn-go" id="goBtn" onclick="runReset()">
    🗑 מחק הכל ואתחל מחדש
  </button>

  <div class="log" id="log"></div>
  <div class="done" id="done"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-db.js?v=20260511"></script>
<script>
// ── משתמשים שייווצרו לאחר האיפוס ──────────────────────────────────────
// הוסף כאן משתמשים נוספים לפי הצורך
const SEED_USERS = [
  {
    phone:       '0547725552',
    id:          '0547725552',
    name:        'בן לוז',
    password:    '781578',
    role:        'admin',
    isMainAdmin: true
  },
  // לקוחות:
  {
    phone:       '0548000775',
    id:          '0548000775',
    name:        'א.מ מראות',
    businessName:'א.מ מראות',
    password:    '0548000775',
    role:        'client',
    isMainAdmin: false
  }
];

// הצג משתמשים שייווצרו (לקוחות בלבד — האדמין כבר מוצג למעלה)
document.getElementById('extraUsersBlock').innerHTML = SEED_USERS
  .filter(u => u.role === 'client')
  .map(u => `<div class="ublock"><div class="role">CLIENT</div>שם: ${u.name} &nbsp;|&nbsp; טלפון: ${u.phone} &nbsp;|&nbsp; סיסמה: ${u.password}</div>`)
  .join('');

function log(msg, cls='info'){
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
}

async function runReset(){
  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>מבצע איפוס...';

  const db = firebase.database();

  // 1. בדיקת חיבור בסיסית
  log('שלב 1 — בדיקת חיבור Firebase', 'info');
  try {
    const tid = '_diag_' + Date.now();
    await db.ref('_test/' + tid).set({ ts: Date.now() });
    await db.ref('_test/' + tid).remove();
    log('✓ Firebase מגיב', 'ok');
  } catch(e) {
    log('✗ Firebase לא נגיש: ' + e.message, 'err');
    log('פתח קונסול Firebase → Database → Rules והגדר ".read":true, ".write":true', 'err');
    btn.disabled = false; btn.innerHTML = '🗑 נסה שוב';
    return;
  }

  // 2. קרא ורשום מה קיים
  log('שלב 2 — קריאת /users קיים', 'info');
  try {
    const snap = await db.ref('users').once('value');
    if (snap.exists()) {
      const users = Object.values(snap.val());
      log(`נמצאו ${users.length} רשומות (יימחקו כולן):`, 'info');
      users.forEach(u => log(`&nbsp;&nbsp;· path: users/${u.id||'?'} · phone:"${u.phone||'?'}" · pass:"${u.password||'?'}"`, 'data'));
    } else {
      log('אין רשומות ב-/users', 'info');
    }
  } catch(e) {
    log('⚠ לא ניתן לקרוא /users: ' + e.message + ' — ממשיך בכל מקרה', 'info');
  }

  // 3. מחק /users לגמרי
  log('שלב 3 — מוחק /users', 'info');
  try {
    await db.ref('users').remove();
    log('✓ /users נמחק', 'ok');
  } catch(e) {
    log('✗ מחיקה נכשלה: ' + e.message, 'err');
    btn.disabled = false; btn.innerHTML = '🗑 נסה שוב';
    return;
  }

  // 4. כתוב כל משתמש — הטלפון הוא ה-ID
  log('שלב 4 — כותב משתמשים', 'info');
  let written = 0;
  for (const u of SEED_USERS) {
    const phone = String(u.phone).replace(/[-\s]/g, '');
    const record = { ...u, id: phone, phone, createdAt: Date.now(), updatedAt: Date.now() };
    try {
      await db.ref('users/' + phone).set(record);
      log(`✓ נכתב: users/${phone} → ${u.name} [${u.role}]`, 'ok');
      written++;
    } catch(e) {
      log(`✗ כישלון בכתיבת ${u.name}: ${e.message}`, 'err');
    }
  }

  // 5. אמת — קרא מחדש ובדוק שהנתיב הישיר עובד
  log('שלב 5 — אימות', 'info');
  for (const u of SEED_USERS) {
    const phone = String(u.phone).replace(/[-\s]/g, '');
    try {
      const snap = await db.ref('users/' + phone).once('value');
      const saved = snap.val();
      if (saved && saved.password === u.password && saved.role === u.role) {
        log(`✓ אומת: users/${phone} — ${saved.name} [${saved.role}]`, 'ok');
      } else {
        log(`✗ אימות כשל עבור ${u.name}`, 'err');
      }
    } catch(e) {
      log(`✗ קריאת אימות נכשלה: ${e.message}`, 'err');
    }
  }

  // 6. נקה session
  sessionStorage.removeItem('lgSession');
  localStorage.removeItem('lgSession');
  log('✓ session ישן נוקה', 'ok');

  // סיום
  if (written === SEED_USERS.length) {
    document.getElementById('done').style.display = 'block';
    document.getElementById('done').innerHTML = `
      ✅ איפוס הושלם בהצלחה<br><br>
      <div style="font-size:12px;color:#aaa;line-height:2;margin-bottom:14px;">
        ${SEED_USERS.map(u=>`<strong style="color:#f0ede8">${u.name}:</strong> ${u.phone} / ${u.password}`).join('<br>')}
      </div>
      <button onclick="window.location.href='login.html'"
        style="padding:10px 28px;background:#27ae60;color:#fff;font-family:Heebo,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;border-radius:6px;">
        → כנס ללוגין
      </button>
    `;
    btn.style.display = 'none';
  } else {
    btn.disabled = false;
    btn.innerHTML = '🗑 נסה שוב';
  }
}
</script>
</body>
</html>
