<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuzGlass — ניהול הזמנות</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f4ef;--bg2:#ede9e1;--surface:#fff;--border:rgba(0,0,0,0.07);--text:#1a1714;--muted:#8a8278;--gold:#b8922a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
  .layout{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{width:210px;flex-shrink:0;background:var(--text);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .sb-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .sb-logo .lg{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#f7f4ef;}
  .sb-logo .lg span{color:var(--gold);}
  .sb-logo .sub{font-size:9px;color:rgba(247,244,239,0.3);letter-spacing:0.28em;text-transform:uppercase;margin-top:3px;}
  .nav{padding:14px 0;flex:1;}
  .nav-sec{padding:14px 18px 5px;font-size:9px;letter-spacing:0.2em;color:rgba(247,244,239,0.2);text-transform:uppercase;}
  .nav-a{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:500;color:rgba(247,244,239,0.5);cursor:pointer;transition:all 0.15s;text-decoration:none;border-right:3px solid transparent;}
  .nav-a:hover{color:rgba(247,244,239,0.85);background:rgba(255,255,255,0.04);}
  .nav-a.active{color:#f7f4ef;border-right-color:var(--gold);background:rgba(255,255,255,0.06);}
  .nav-a .ic{font-size:14px;width:18px;text-align:center;}
  .sb-bot{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);}
  .sb-bot a{font-size:12px;color:rgba(247,244,239,0.35);text-decoration:none;display:block;padding:5px 0;transition:color 0.15s;}
  .sb-bot a:hover{color:var(--gold);}

  /* MAIN */
  .main{flex:1;overflow-x:hidden;}

  /* TOPBAR */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar-title{font-size:15px;font-weight:700;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .search-wrap{display:flex;align-items:center;gap:7px;padding:7px 12px;background:var(--bg);border:1px solid var(--border);}
  .search-wrap input{background:none;border:none;outline:none;font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);width:150px;}
  .btn-new{padding:9px 18px;background:var(--gold);color:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:background 0.2s;}
  .btn-new:hover{background:#9a7520;}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin:18px 24px 0;}
  .stat{background:var(--surface);padding:16px 18px;border:1px solid var(--border);}
  .stat .n{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--gold);line-height:1;}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px;}
  .stat .d{font-size:10px;margin-top:5px;}

  /* FILTERS */
  .filters{margin:14px 24px 0;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .fb{padding:6px 12px;background:var(--surface);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;}
  .fb:hover{border-color:var(--gold);color:var(--text);}
  .fb.active{background:var(--bg2);border-color:var(--gold);color:var(--text);font-weight:700;}
  .fsel{padding:6px 10px;background:var(--surface);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:12px;color:var(--muted);outline:none;cursor:pointer;-webkit-appearance:none;}
  .fsel:focus{border-color:var(--gold);}

  /* VIEW TOGGLE */
  .view-toggle{display:flex;gap:3px;margin-right:auto;}
  .vt{padding:5px 10px;background:var(--surface);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
  .vt.active{background:var(--text);color:#f7f4ef;border-color:var(--text);}

  /* KANBAN */
  .kanban{margin:14px 24px 24px;display:grid;grid-template-columns:repeat(7,minmax(170px,1fr));gap:6px;overflow-x:auto;padding-bottom:4px;}
  .kcol{display:flex;flex-direction:column;gap:5px;min-width:170px;}
  .khdr{padding:9px 11px;background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--cc);}
  .khdr .ct{font-size:10px;font-weight:700;color:var(--cc);letter-spacing:0.04em;}
  .khdr .cn{font-size:10px;color:var(--muted);margin-top:1px;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);padding:11px 12px;cursor:pointer;transition:box-shadow 0.15s,transform 0.15s;position:relative;}
  .card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.08);transform:translateY(-1px);}
  .card.urgent{border-right:3px solid #c0392b;}
  .c-urg{font-size:9px;color:#c0392b;font-weight:700;margin-bottom:3px;}
  .c-num{font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-bottom:3px;}
  .c-client{font-size:13px;font-weight:700;margin-bottom:2px;}
  .c-name{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .c-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;}
  .tag{padding:2px 6px;font-size:9px;font-weight:600;border-radius:1px;}
  .tg{background:rgba(41,128,185,0.1);color:#2980b9;}
  .tf{background:rgba(184,146,42,0.1);color:var(--gold);}
  .tt{background:rgba(0,0,0,0.05);color:var(--muted);}
  .c-foot{display:flex;align-items:center;justify-content:space-between;}
  .c-area{font-size:10px;color:var(--muted);}
  .c-price{font-size:12px;font-weight:700;color:var(--gold);}
  .c-acts{display:flex;gap:4px;margin-top:7px;}
  .cb-btn{flex:1;padding:5px;background:var(--bg);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.15s;text-decoration:none;display:block;}
  .cb-btn:hover{background:var(--bg2);border-color:var(--gold);color:var(--text);}
  .cb-btn.pr{background:var(--gold);color:#fff;border-color:var(--gold);}
  .cb-btn.pr:hover{background:#9a7520;}

  /* TABLE */
  .table-wrap{margin:14px 24px 24px;overflow-x:auto;background:var(--surface);border:1px solid var(--border);}
  .ot{width:100%;border-collapse:collapse;font-size:12px;}
  .ot th{padding:9px 11px;background:var(--bg2);font-weight:600;color:var(--muted);font-size:10px;letter-spacing:0.07em;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
  .ot td{padding:11px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .ot tr:hover td{background:var(--bg);}
  .badge{display:inline-block;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:0.04em;color:#fff;border-radius:1px;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(26,23,20,0.55);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);width:100%;max-width:580px;margin:auto;animation:su 0.22s ease;}
  @keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .mhdr{padding:18px 22px;background:var(--text);color:#f7f4ef;display:flex;align-items:center;justify-content:space-between;}
  .mhdr h2{font-size:15px;font-weight:700;}
  .mcl{background:none;border:none;color:rgba(247,244,239,0.45);font-size:19px;cursor:pointer;}
  .mbody{padding:20px 22px;}
  .msec{margin-bottom:18px;}
  .msec-t{font-size:10px;font-weight:600;letter-spacing:0.18em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .mf{display:flex;flex-direction:column;gap:3px;}
  .mf label{font-size:10px;color:var(--muted);}
  .mf .v{font-size:13px;font-weight:600;}
  .msel{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:13px;color:var(--text);outline:none;-webkit-appearance:none;cursor:pointer;}
  .msel:focus{border-color:var(--gold);}
  .mimg{width:100%;border:1px solid var(--border);display:block;margin-top:6px;}
  .mfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:7px;}
  .btn-save{flex:1;padding:12px;background:var(--gold);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;}
  .btn-cancel{padding:12px 18px;background:transparent;color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;border:1px solid var(--border);cursor:pointer;}

  @media(max-width:860px){
    .sidebar{display:none;}
    .stats{grid-template-columns:repeat(2,1fr);margin:12px 14px 0;}
    .filters,.kanban,.table-wrap{margin-right:14px;margin-left:14px;}
    .topbar{padding:0 14px;}
  }
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="lg">Luz<span>Glass</span></div>
    <div class="sub">מערכת ניהול</div>
  </div>
  <nav class="nav">
    <div class="nav-sec">ראשי</div>
    <a class="nav-a active" href="#" onclick="setView('kanban',this)"><span class="ic">⬡</span>לוח הזמנות</a>
    <a class="nav-a" href="#" onclick="setView('table',this)"><span class="ic">☰</span>טבלה</a>
    <div class="nav-sec">ניהול</div>
    <a class="nav-a" href="sketch-demo.html"><span class="ic">✏️</span>סקיצה חדשה</a>
    <a class="nav-a" href="order-view.html"><span class="ic">📋</span>הזמנה מלאה</a>
    <a class="nav-a" href="mekhlahon.html"><span class="ic">🚿</span>קונפיגורטור</a>
    <a class="nav-a" href="#" onclick="openPricing()"><span class="ic">💰</span>מחירונים</a>
    <a class="nav-a" href="#" onclick="openPickupBoard()"><span class="ic">📅</span>לוח איסופים</a>
    <a class="nav-a" href="#" onclick="openInbox()" id="inboxNav"><span class="ic">📥</span>סקיצות נכנסות <span id="inboxBadge" style="display:none;background:#c0392b;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-right:4px"></span></a>
    <a class="nav-a" href="index.html"><span class="ic">🌐</span>לאתר</a>
  </nav>
  <div class="sb-bot">
    <a href="#">הגדרות</a>
    <a href="#" onclick="exportCSV()">יצוא CSV</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pgTitle">לוח הזמנות</div>
    <div class="topbar-right">
      <div class="search-wrap">
        <span style="color:var(--muted)">🔍</span>
        <input type="text" id="srch" placeholder="חיפוש..." oninput="renderAll()">
      </div>
      <div class="view-toggle">
        <button class="vt active" id="vtK" onclick="setView('kanban',this)">⬡ לוח</button>
        <button class="vt" id="vtT" onclick="setView('table',this)">☰ טבלה</button>
      </div>
      <a href="sketch-demo.html" class="btn-new">+ סקיצה חדשה</a>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <button class="fb active" onclick="setSF('all',this)">הכל</button>
    <button class="fb" onclick="setSF('ממתין לאישור',this)">ממתין לאישור</button>
    <button class="fb" onclick="setSF('מחכה ל-OptyWay',this)">OptyWay</button>
    <button class="fb" onclick="setSF('ירד לביצוע',this)">בביצוע</button>
    <button class="fb" onclick="setSF('נשלח לחיסום',this)">בחיסום</button>
    <button class="fb" onclick="setSF('חזר מחיסום',this)">חזר מחיסום</button>
    <button class="fb" onclick="setSF('מוכן לאיסוף',this)">מוכן לאיסוף</button>
    <button class="fb" onclick="setSF('נאסף',this)">נאסף</button>
    <select class="fsel" id="gf" onchange="renderAll()">
      <option value="">כל הזכוכיות</option>
      <option>שקוף</option><option>קליר</option><option>גרניט</option>
      <option>אסיד</option><option>אפור</option><option>ברונזה</option>
      <option>פיפיטה</option><option>אסיד קליר</option><option>גלינה שקוף</option><option>גלינה קליר</option>
    </select>
  </div>

  <div id="kanbanView" class="kanban"></div>
  <div id="tableView" class="table-wrap" style="display:none">
    <table class="ot"><thead><tr>
      <th>#</th><th>לקוח</th><th>הזמנה</th><th>סוג מקלחון</th>
      <th>זכוכית</th><th>פרזול</th><th>שטח</th><th>מחיר</th>
      <th>סטטוס</th><th>תאריך</th><th></th>
    </tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov" onclick="closeMod(event)">
  <div class="modal">
    <div class="mhdr"><h2 id="mtitle">פרטי הזמנה</h2><button class="mcl" onclick="closeMod()">✕</button></div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot">
      <button class="btn-save" onclick="saveMod()">שמור</button>
      <button class="btn-cancel" onclick="closeMod()">ביטול</button>
    </div>
  </div>
</div>

<script>
const ST=[
  {id:'ממתין לאישור',   c:'#6b7fa3'},
  {id:'מחכה ל-OptyWay',c:'#e67e22'},
  {id:'ירד לביצוע',    c:'#2980b9'},
  {id:'נשלח לחיסום',   c:'#8e44ad'},
  {id:'חזר מחיסום',    c:'#27ae60'},
  {id:'מוכן לאיסוף',   c:'#b8922a'},
  {id:'נאסף',          c:'#95a5a6'},
];
const NEXT={'ממתין לאישור':'מחכה ל-OptyWay','מחכה ל-OptyWay':'ירד לביצוע','ירד לביצוע':'נשלח לחיסום','נשלח לחיסום':'חזר מחיסום','חזר מחיסום':'מוכן לאיסוף','מוכן לאיסוף':'נאסף'};

const DEMO=[
  {id:1001,orderClient:'בן-דוד',orderNum:'2026-001',sketchName:'חדר רחצה ראשי',type:'חזית קבוע ודלת',cat:'חזיתי',glass:'שקוף',finish:'שחור מט',quality:'pliz',area:'1.60',total:2800,date:'01/04/2026',status:'מחכה ל-OptyWay',urgent:true},
  {id:1002,orderClient:'כהן שיפוצים',orderNum:'2026-002',sketchName:'מקלחון אורחים',type:'פינתי קבוע ודלת',cat:'פינתי',glass:'קליר',finish:'זהב מוברש',quality:'pliz',area:'2.10',total:4200,date:'01/04/2026',status:'ירד לביצוע'},
  {id:1003,orderClient:'לוי קבלן',orderNum:'2026-003',sketchName:'תל אביב יח׳ 1',type:'פינתי 2 קבועים 2 דלתות',cat:'פינתי',glass:'אפור',finish:'גרפיט',quality:'zamak',area:'3.20',total:5600,date:'31/03/2026',status:'נשלח לחיסום'},
  {id:1004,orderClient:'לוי קבלן',orderNum:'2026-003',sketchName:'תל אביב יח׳ 2',type:'חזית 2 קבוע ודלת',cat:'חזיתי',glass:'אפור',finish:'גרפיט',quality:'zamak',area:'2.80',total:4900,date:'31/03/2026',status:'נשלח לחיסום'},
  {id:1005,orderClient:'מזרחי עיצוב',orderNum:'2026-004',sketchName:'וילה הרצליה',type:'אמבטיון הזזה',cat:'אמבטיון',glass:'גלינה קליר',finish:'זהב',quality:'pliz',area:'1.40',total:3800,date:'30/03/2026',status:'חזר מחיסום'},
  {id:1006,orderClient:'ישראלי בנייה',orderNum:'2026-005',sketchName:'בניין רחובות',type:'קבוע בלבד',cat:'קבוע',glass:'ברונזה',finish:'רוז גולד',quality:'zamak',area:'1.20',total:2100,date:'29/03/2026',status:'מוכן לאיסוף'},
  {id:1007,orderClient:'שמש שיפוצים',orderNum:'2026-006',sketchName:'דירה פתח תקווה',type:'חזית קבוע ודלת',cat:'חזיתי',glass:'שקוף',finish:'שחור מט',quality:'zamak',area:'1.60',total:2400,date:'28/03/2026',status:'נאסף'},
  {id:1008,orderClient:'גולן עיצוב',orderNum:'2026-007',sketchName:'בית פרטי קיסריה',type:'פינתי 2 קבועים 2 דלתות',cat:'פינתי',glass:'אסיד קליר',finish:'זהב מוברש',quality:'pliz',area:'3.60',total:6800,date:'02/04/2026',status:'ממתין לאישור',urgent:true},
];

let orders=[], sf='all', cv='kanban', eid=null;

function load(){
  const saved=JSON.parse(localStorage.getItem('lgOrders')||'[]');
  saved.forEach(o=>{if(!o.status)o.status='ממתין לאישור';});
  orders=[...DEMO.map(d=>({...d})),...saved];
}
function save(){
  const s=orders.filter(o=>o.id>9999||typeof o.id==='string');
  localStorage.setItem('lgOrders',JSON.stringify(s));
}

function setSF(s,btn){
  sf=s;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderAll();
}

function setView(v,btn){
  cv=v;
  document.getElementById('kanbanView').style.display=v==='kanban'?'grid':'none';
  document.getElementById('tableView').style.display=v==='table'?'block':'none';
  document.getElementById('pgTitle').textContent=v==='kanban'?'לוח הזמנות':'טבלת הזמנות';
  document.querySelectorAll('.vt').forEach(b=>b.classList.remove('active'));
  document.getElementById(v==='kanban'?'vtK':'vtT').classList.add('active');
  renderAll();
}

function filtered(){
  const q=document.getElementById('srch').value.toLowerCase();
  const g=document.getElementById('gf').value;
  return orders.filter(o=>{
    if(sf!=='all'&&o.status!==sf)return false;
    if(g&&o.glass!==g)return false;
    if(q){const h=((o.orderClient||'')+(o.orderNum||'')+(o.sketchName||'')+(o.type||'')).toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
}

function renderAll(){renderStats();if(cv==='kanban')renderKanban();else renderTable();}

function renderStats(){
  const f=filtered();
  const tot=f.reduce((s,o)=>s+(o.total||0),0);
  const inP=f.filter(o=>['ירד לביצוע','נשלח לחיסום','חזר מחיסום'].includes(o.status)).length;
  const rdy=f.filter(o=>o.status==='מוכן לאיסוף').length;
  const urg=f.filter(o=>o.urgent).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${f.length}</div><div class="l">הזמנות</div></div>
    <div class="stat"><div class="n">${inP}</div><div class="l">בייצור</div></div>
    <div class="stat"><div class="n">${rdy}</div><div class="l">מוכנות לאיסוף</div>${rdy?'<div class="d" style="color:#b8922a">⚡ ממתינות</div>':''}</div>
    <div class="stat"><div class="n">₪${tot.toLocaleString()}</div><div class="l">שווי כולל</div>${urg?`<div class="d" style="color:#c0392b">🔴 ${urg} דחופות</div>`:''}</div>`;
}

function renderKanban(){
  const f=filtered();
  document.getElementById('kanbanView').innerHTML=ST.map(s=>{
    const cards=f.filter(o=>o.status===s.id);
    return `<div class="kcol">
      <div class="khdr" style="--cc:${s.c}">
        <div class="ct" style="color:${s.c}">${s.id}</div>
        <div class="cn">${cards.length} הזמנות</div>
      </div>
      ${cards.map(o=>card(o,s)).join('')}
    </div>`;
  }).join('');
}

function card(o,s){
  const nxt=NEXT[o.status];
  return `<div class="card ${o.urgent?'urgent':''}" onclick="openMod(${o.id})">
    ${o.urgent?'<div class="c-urg">🔴 דחוף</div>':''}

function setUrg(v){
  const o=orders.find(x=>x.id===eid);
  if(o){o.urgent=v;document.getElementById('murg').classList.toggle('active',v);document.getElementById('mnrm').classList.toggle('active',!v);}
}
function saveMod(){
  const o=orders.find(x=>x.id===eid);
  if(o){o.status=document.getElementById('mst').value;save();renderAll();}
  closeMod();
}
function closeMod(e){
  if(e&&e.target!==document.getElementById('ov'))return;
  document.getElementById('ov').classList.remove('open');eid=null;
}

function exportCSV(){
  const rows=[['לקוח','הזמנה','סוג','זכוכית','פרזול','שטח','מחיר','סטטוס','תאריך']];
  orders.forEach(o=>rows.push([o.orderClient,o.orderNum,o.type,o.glass,o.finish,o.area,o.total,o.status,o.date]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='luzglass-orders.csv';a.click();
}

let pricingTab = 'global';

function openPricing(){

function closePricing(){

}
function setPTab(t){
  pricingTab=t;
  document.getElementById('pt-global').style.borderBottomColor = t==='global'?'var(--gold)':'transparent';
  document.getElementById('pt-global').style.color = t==='global'?'var(--text)':'var(--muted)';

function renderPricing(){
  const el=document.getElementById('pricingBody');
  if(pricingTab==='global'){
    const cats={};
    PRICE_ITEMS.forEach(p=>{if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});

      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">מחיר ל-מ"ר. ריק = "לפי הצעה"</p>

          ${items.map(p=>`

        `).join('')}
        </tbody>
      </table>`;
  } else {
    // get unique clients from orders
    const clients=[...new Set(orders.map(o=>o.orderClient).filter(Boolean))];
    const selClient=document.getElementById('clientSel')?.value||clients[0]||'';
    const cats={};
    PRICE_ITEMS.forEach(p=>{if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});
    const cp=clientPrices[selClient]||{};
    el.innerHTML=`
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">מחיר מיוחד ללקוח. ריק = מחירון כללי</p>
      <select class="client-sel" id="clientSel" onchange="renderPricing()">
        ${clients.map(c=>`<option value="${c}" ${c===selClient?'selected':''}>${c}</option>`).join('')}
        <option value="__new__">+ לקוח חדש</option>
      </select>
      ${selClient==='__new__'?`<input type="text" id="newClientName" class="client-sel" placeholder="שם לקוח חדש" style="margin-bottom:14px">`:''}

        <thead><tr><th>סוג זכוכית</th><th>מחיר כללי</th><th>מחיר ללקוח</th></tr></thead>
        <tbody>
        ${Object.entries(cats).map(([cat,items])=>`
          <tr><td colspan="3" class="price-cat">${cat}</td></tr>
          ${items.map(p=>`
            <tr>
              <td>${p.name}</td>
              <td style="color:var(--muted);font-size:12px">${globalPrices[p.id]?'₪'+globalPrices[p.id]:'—'}</td>

            </tr>`).join('')}
        `).join('')}

}

function savePricing(){
  if(pricingTab==='global'){
    PRICE_ITEMS.forEach(p=>{
      const v=document.getElementById('gp_'+p.id)?.value;
      const n=document.getElementById('gn_'+p.id)?.value;
      if(v) globalPrices[p.id]=parseFloat(v);
      else delete globalPrices[p.id];
      if(n) globalPrices[p.id+'_note']=n;
      else delete globalPrices[p.id+'_note'];
    });
    localStorage.setItem('lgPricesGlobal',JSON.stringify(globalPrices));
  } else {
    let client=document.getElementById('clientSel')?.value;
    if(client==='__new__') client=document.getElementById('newClientName')?.value;
    if(!client) return;
    const cp={};
    PRICE_ITEMS.forEach(p=>{
      const v=document.getElementById('cp_'+p.id)?.value;
      if(v) cp[p.id]=parseFloat(v);
    });
    clientPrices[client]=cp;
    localStorage.setItem('lgPricesClient',JSON.stringify(clientPrices));
  }
  closePricing();
  const t=document.getElementById('toast')||document.createElement('div');
  t.textContent='✓ מחירים נשמרו';
  t.className='toast show';
  if(!t.id){t.id='toast';document.body.appendChild(t);}
  setTimeout(()=>t.classList.remove('show'),2500);
}

let viewerImages=[], viewerIdx=0;

function getSubmissions(){
  return JSON.parse(localStorage.getItem('lgSubmissions')||'[]');
}

function checkInboxBadge(){
  const subs=getSubmissions();
  const unread=subs.filter(s=>!s.read).length;
  const badge=document.getElementById('inboxBadge');
  if(badge){
    badge.style.display=unread>0?'inline':'none';
    badge.textContent=unread;
  }
}

function openInbox(){
  document.getElementById('inboxOv').classList.add('open');
  renderInbox();
}
function closeInbox(){
  document.getElementById('inboxOv').classList.remove('open');
}

function renderInbox(){
  const subs=getSubmissions();
  const el=document.getElementById('inboxBody');
  if(!subs.length){
    el.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="font-size:14px">אין סקיצות נכנסות עדיין</div><div style="font-size:12px;margin-top:8px">שלח ללקוחות את הקישור: <strong>upload.html</strong></div></div>';
    return;
  }
  el.innerHTML=subs.map((s,i)=>`
    <div class="inbox-item ${!s.read?'unread':''}" onclick="openSubmission(${i})">
      ${s.files&&s.files[0]&&s.files[0].data
        ?`<img class="inbox-thumb" src="${s.files[0].data}" alt="">`
        :`<div class="inbox-thumb-ph">📄</div>`}
      <div class="inbox-info">
        <div class="inbox-client">${s.client} ${!s.read?'<span style="font-size:10px;background:var(--gold);color:#fff;padding:1px 6px;border-radius:2px;margin-right:6px">חדש</span>':''}</div>
        <div class="inbox-meta">📞 ${s.phone} &nbsp;·&nbsp; ${s.date} ${s.time} &nbsp;·&nbsp; ${s.files?.length||0} קבצים</div>
        <div class="inbox-note">${s.type?'📌 '+s.type+' &nbsp;·&nbsp; ':''} ${s.notes||'ללא הערות'}</div>
        <div class="inbox-ref">${s.refNum}</div>
        <div class="inbox-acts" onclick="event.stopPropagation()">
          ${s.files?.length?`<button class="ia-btn pr" onclick="viewImages(${i})">🖼️ צפה בתמונות (${s.files.length})</button>`:''}
          <button class="ia-btn" onclick="markRead(${i})">✓ סמן כנקרא</button>
          <button class="ia-btn" onclick="deleteSubmission(${i})">🗑️</button>
        </div>
      </div>
    </div>`).join('');
}

function openSubmission(idx){
  const subs=getSubmissions();
  subs[idx].read=true;
  localStorage.setItem('lgSubmissions',JSON.stringify(subs));
  checkInboxBadge();
  if(subs[idx].files?.length) viewImages(idx);
  renderInbox();
}

function markRead(idx){
  const subs=getSubmissions();
  subs[idx].read=true;
  localStorage.setItem('lgSubmissions',JSON.stringify(subs));
  checkInboxBadge();
  renderInbox();
}

function deleteSubmission(idx){
  if(!confirm('למחוק את הסקיצה?')) return;
  const subs=getSubmissions();
  subs.splice(idx,1);
  localStorage.setItem('lgSubmissions',JSON.stringify(subs));
  checkInboxBadge();
  renderInbox();
}

function viewImages(subIdx){
  const subs=getSubmissions();
  const files=(subs[subIdx].files||[]).filter(f=>f.data);
  if(!files.length) return;
  viewerImages=files.map(f=>f.data);
  viewerIdx=0;
  document.getElementById('viewerImg').src=viewerImages[0];
  document.getElementById('viewerCounter').textContent=`1 / ${viewerImages.length}`;
  document.getElementById('imgViewer').classList.add('open');
}

function viewerNav(dir){
  viewerIdx=(viewerIdx+dir+viewerImages.length)%viewerImages.length;
  document.getElementById('viewerImg').src=viewerImages[viewerIdx];
  document.getElementById('viewerCounter').textContent=`${viewerIdx+1} / ${viewerImages.length}`;
}

function closeViewer(){
  document.getElementById('imgViewer').classList.remove('open');
}

// check badge on load
setTimeout(checkInboxBadge,100);
setInterval(checkInboxBadge,30000);

function openPickupBoard(){

  renderPickupBoard();
}
function closePickup(){
  document.getElementById('pickupOv').classList.remove('open');
}

function renderPickupBoard(){
  const allPickups = JSON.parse(localStorage.getItem('lgAllPickups')||'{}');
  const el = document.getElementById('pickupBody');

  if(!Object.keys(allPickups).length){
    el.innerHTML=`<div class="pickup-empty">
      <div style="font-size:36px;margin-bottom:12px">📅</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">אין איסופים מתוזמנים</div>
      <div style="font-size:12px">לקוחות יתזמנו איסוף דרך הפורטל שלהם</div>
    </div>`;
    return;
  }

  // Group by date
  const byDate = {};
  Object.values(allPickups).forEach(p=>{
    const d = p.date||'';
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(p);
  });

  // Sort dates
  const sorted = Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b));

  el.innerHTML = sorted.map(([date, pickups])=>{
    const farzelCount = pickups.filter(p=>p.hasFarzel).length;
    const totalVal = pickups.reduce((s,p)=>s+(p.total||0),0);
    const dateLabel = new Date(date).toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    return `<div class="pickup-day">
      <div class="pd-header">
        <span style="font-size:18px">📅</span>
        <div class="pd-date">${dateLabel}</div>
        <div class="pd-count">${pickups.length} לקוחות</div>
        ${farzelCount?`<div class="pd-farzel-count">🔩 ${farzelCount} עם פרזול</div>`:''}
        <div style="margin-right:auto;font-size:13px;font-weight:700;color:var(--gold)">₪${totalVal.toLocaleString()}</div>
      </div>
      ${pickups.map(p=>`
        <div class="pickup-item">
          <div class="pi-info">
            <div class="pi-client">${p.client||'—'}</div>
            <div class="pi-order">${p.orderNum||''} · ${p.orderName||''}</div>
            <div class="pi-glass">⬡ ${p.glass||'—'}</div>
            <div class="pi-farzel ${p.hasFarzel?'yes':'no'}">
              ${p.hasFarzel?'🔩 כולל פרזול: '+p.finish:'⬡ ללא פרזול'}
            </div>
            ${p.items&&p.items.length?`
              <div class="pi-items">
                ${p.items.map(i=>`<div class="pi-item-row">${i.name||''} ${i.w||''}${i.w?'×':''}${i.h||''} ס"מ ${i.chisum?'— מחוסם':i.litush?'— מלוטש':''}</div>`).join('')}
              </div>`:''}
          </div>
          <div>
            <div class="pi-total">₪${(p.total||0).toLocaleString()}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">${p.phone||''}</div>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

.price-input{width:90px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);font-family:Heebo,sans-serif;font-size:13px;color:var(--text);outline:none;text-align:center;border-radius:0;}
.price-input:focus{border-color:var(--gold);}
.price-cat{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.1em;padding:10px 10px 4px;background:var(--bg2);border-top:1px solid var(--border);}
.client-sel{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);font-family:Heebo,sans-serif;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none;margin-bottom:14px;cursor:pointer;}
.client-sel:focus{border-color:var(--gold);}
</style>

<!-- INBOX MODAL -->
<div class="overlay" id="inboxOv" onclick="if(event.target===this)closeInbox()" style="z-index:200">
  <div class="modal" style="max-width:720px">
    <div class="mhdr" style="display:flex;align-items:center;justify-content:space-between">
      <h2>📥 סקיצות נכנסות</h2>
      <button class="mcl" onclick="closeInbox()">✕</button>
    </div>
    <div style="padding:0;max-height:75vh;overflow-y:auto" id="inboxBody">
      <div style="padding:24px;text-align:center;color:var(--muted)">טוען...</div>
    </div>
  </div>
</div>

<style>
.inbox-item{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;gap:14px;cursor:pointer;transition:background 0.15s;}
.inbox-item:hover{background:var(--bg);}
.inbox-item.unread{border-right:3px solid var(--gold);}
.inbox-thumb{width:70px;height:70px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
.inbox-thumb-ph{width:70px;height:70px;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--border);}
.inbox-info{flex:1;min-width:0;}
.inbox-client{font-size:14px;font-weight:700;margin-bottom:2px;}
.inbox-meta{font-size:11px;color:var(--muted);margin-bottom:6px;}
.inbox-note{font-size:12px;color:var(--text);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inbox-ref{font-size:10px;color:var(--gold);font-weight:700;margin-top:4px;}
.inbox-acts{display:flex;gap:6px;margin-top:8px;}
.ia-btn{padding:5px 10px;font-family:Heebo,sans-serif;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all 0.15s;}
.ia-btn:hover{background:var(--bg2);border-color:var(--gold);color:var(--text);}
.ia-btn.pr{background:var(--gold);color:#fff;border-color:var(--gold);}
/* image viewer */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.img-viewer.open{display:flex;}
.img-viewer img{max-width:95vw;max-height:85vh;object-fit:contain;}
.img-viewer-close{position:absolute;top:16px;left:16px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;}
.img-viewer-nav{display:flex;gap:12px;}
.img-viewer-nav button{padding:8px 20px;background:rgba(255,255,255,0.15);color:#fff;border:none;font-family:Heebo,sans-serif;font-size:14px;cursor:pointer;}
</style>

<!-- IMAGE VIEWER -->
<div class="img-viewer" id="imgViewer">
  <button class="img-viewer-close" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="" alt="">
  <div class="img-viewer-nav">
    <button onclick="viewerNav(-1)">→ הקודם</button>
    <span id="viewerCounter" style="color:rgba(255,255,255,0.5);font-size:13px;padding:8px 4px"></span>
    <button onclick="viewerNav(1)">הבא ←</button>
  </div>
</div>

<!-- PICKUP BOARD MODAL -->
<div class="overlay" id="pickupOv" onclick="if(event.target===this)closePickup()" style="z-index:200">
  <div class="modal" style="max-width:700px">
    <div class="mhdr" style="display:flex;align-items:center;justify-content:space-between">
      <h2>📅 לוח איסופים</h2>
      <button class="mcl" onclick="closePickup()">✕</button>
    </div>
    <div style="padding:0;max-height:75vh;overflow-y:auto" id="pickupBody"></div>
  </div>
</div>

<style>
.pickup-day{margin-bottom:0;}
.pd-header{padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.pd-date{font-size:14px;font-weight:700;}
.pd-count{font-size:11px;color:var(--muted);}
.pd-farzel-count{font-size:11px;font-weight:700;color:var(--gold);}
.pickup-item{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start;}
.pi-info{flex:1;}
.pi-client{font-size:14px;font-weight:700;margin-bottom:3px;}
.pi-order{font-size:12px;color:var(--muted);margin-bottom:6px;}
.pi-glass{font-size:12px;margin-bottom:4px;}
.pi-farzel{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;font-size:11px;font-weight:700;border-radius:2px;}
.pi-farzel.yes{background:rgba(184,146,42,0.1);color:var(--gold);}
.pi-farzel.no{background:rgba(0,0,0,0.05);color:var(--muted);}
.pi-items{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.pi-item-row{font-size:11px;color:var(--muted);padding:3px 8px;background:var(--bg);}
.pi-total{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;}
.pickup-empty{padding:40px;text-align:center;color:var(--muted);}
</style>
</body>
</html>
