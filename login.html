<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuzGlass — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:'Heebo',sans-serif;direction:rtl;}

  body{
    background:#1a1714;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }

  /* background texture */
  body::before{
    content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse at 60% 30%, rgba(184,146,42,0.07) 0%, transparent 60%),
               radial-gradient(ellipse at 20% 80%, rgba(184,146,42,0.04) 0%, transparent 50%);
    pointer-events:none;
  }

  .card{
    background:#242424;border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;padding:40px 36px;width:100%;max-width:400px;
    box-shadow:0 24px 64px rgba(0,0,0,0.5);position:relative;
  }

  .logo{
    text-align:center;margin-bottom:32px;
  }
  .logo-text{
    font-family:'Playfair Display',serif;font-size:30px;color:#f7f4ef;letter-spacing:0.02em;
  }
  .logo-text span{color:#b8922a;}
  .logo-sub{font-size:12px;color:#888;margin-top:6px;letter-spacing:0.12em;text-transform:uppercase;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:#888;margin-bottom:7px;letter-spacing:0.05em;}
  .field input{
    width:100%;padding:13px 14px;
    background:#1a1714;border:1px solid rgba(255,255,255,0.1);
    font-family:Heebo,sans-serif;font-size:15px;color:#f0ede8;
    outline:none;border-radius:6px;transition:border 0.2s;
  }
  .field input:focus{border-color:rgba(184,146,42,0.6);}
  .field input::placeholder{color:#555;}

  .btn-login{
    width:100%;padding:15px;margin-top:8px;
    background:#b8922a;color:#1a1714;
    font-family:Heebo,sans-serif;font-size:15px;font-weight:900;
    border:none;cursor:pointer;border-radius:6px;
    transition:background 0.15s;
    letter-spacing:0.02em;
  }
  .btn-login:hover{background:#c9a84c;}
  .btn-login:active{transform:scale(0.98);}

  .error{
    background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);
    color:#e74c3c;padding:10px 14px;border-radius:6px;
    font-size:13px;margin-bottom:16px;display:none;
  }

  .footer-text{
    text-align:center;margin-top:24px;
    font-size:11px;color:#555;
  }

  /* loading spinner */
  .spinner{
    display:none;width:20px;height:20px;border:2px solid rgba(26,23,20,0.3);
    border-top-color:#1a1714;border-radius:50%;animation:spin 0.7s linear infinite;
    margin:0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* demo hint */
  .demo-hint{
    margin-top:20px;padding:12px 14px;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
    border-radius:6px;font-size:11px;color:#666;line-height:1.7;
  }
  .demo-hint strong{color:#888;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-text">Luz<span>Glass</span></div>
    <div class="logo-sub">מפעל עיבוד זכוכית</div>
  </div>

  <div class="error" id="errMsg">שם משתמש או סיסמה שגויים</div>

  <div class="field">
    <label>שם משתמש / טלפון</label>
    <input type="text" id="username" placeholder="054-1234567" autocomplete="username"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <div class="field">
    <label>סיסמה</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="btn-login" onclick="doLogin()">
    <span id="btnLabel">כניסה</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="demo-hint">
    <strong>אדמין:</strong> admin / admin1234<br>
    <strong>לקוחות:</strong><br>
    א.מ מראות: 054-8000775 / 1234<br>
    כהן שיפוצים: 052-9876543 / 5678<br>
    לוי קבלן: 050-1112233 / 9012<br>
    מזרחי עיצוב: 054-7725552 / 241199
  </div>
</div>

<div class="footer-text">© 2026 LuzGlass · כל הזכויות שמורות</div>

<script>
// ─── USERS DATABASE ───
const CLIENTS = [
  {id:'c001', name:'א.מ מראות',    phone:'054-8000775', password:'1234'},
  {id:'c002', name:'כהן שיפוצים', phone:'052-9876543', password:'5678'},
  {id:'c003', name:'לוי קבלן',    phone:'050-1112233', password:'9012'},
  {id:'c004', name:'מזרחי עיצוב', phone:'054-7725552', password:'241199'},
];
localStorage.setItem('lgClients', JSON.stringify(CLIENTS));

const USERS = [
  {
    id:'admin',
    username:'admin',
    password:'admin1234',
    name:'מנהל',
    role:'admin',
    redirect:'admin.html'
  },
  ...CLIENTS.map(c=>({
    id: c.id,
    username: c.phone,
    password: c.password,
    name: c.name,
    phone: c.phone,
    role: 'client',
    redirect: 'portal.html'
  }))
];

function doLogin(){
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const errEl = document.getElementById('errMsg');
  errEl.style.display='none';

  if(!u || !p){
    errEl.textContent='נא למלא שם משתמש וסיסמה';
    errEl.style.display='block';
    return;
  }

  // show spinner
  document.getElementById('btnLabel').style.display='none';
  document.getElementById('spinner').style.display='block';

  setTimeout(()=>{
    const user = USERS.find(x =>
      (x.username === u || x.phone === u) && x.password === p
    );

    if(!user){
      document.getElementById('btnLabel').style.display='block';
      document.getElementById('spinner').style.display='none';
      errEl.textContent='שם משתמש או סיסמה שגויים';
      errEl.style.display='block';
      document.getElementById('password').value='';
      return;
    }

    // Save session
    sessionStorage.setItem('lgSession', JSON.stringify({
      id: user.id,
      name: user.name,
      role: user.role,
      phone: user.phone||'',
      loginTime: Date.now()
    }));

    window.location.href = user.redirect;
  }, 600);
}

// If already logged in, redirect
const sess = JSON.parse(sessionStorage.getItem('lgSession')||'{}');
if(sess.role === 'admin') window.location.href='admin.html';
else if(sess.role === 'client') window.location.href='portal.html';
</script>
</body>
</html>
