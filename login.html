<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- מניעת cache — Safari, Chrome, כל דפדפן -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>LuzGlass — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:'Heebo',sans-serif;direction:rtl;}

  body{
    background:#1a1714;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }

  /* background texture */
  body::before{
    content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse at 60% 30%, rgba(184,146,42,0.07) 0%, transparent 60%),
               radial-gradient(ellipse at 20% 80%, rgba(184,146,42,0.04) 0%, transparent 50%);
    pointer-events:none;
  }

  .card{
    background:#242424;border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;padding:40px 36px;width:100%;max-width:400px;
    box-shadow:0 24px 64px rgba(0,0,0,0.5);position:relative;
  }

  .logo{
    text-align:center;margin-bottom:32px;
  }
  .logo-text{
    font-family:'Playfair Display',serif;font-size:30px;color:#f7f4ef;letter-spacing:0.02em;
  }
  .logo-text span{color:#b8922a;}
  .logo-sub{font-size:12px;color:#888;margin-top:6px;letter-spacing:0.12em;text-transform:uppercase;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:#888;margin-bottom:7px;letter-spacing:0.05em;}
  .field input{
    width:100%;padding:13px 14px;
    background:#1a1714;border:1px solid rgba(255,255,255,0.1);
    font-family:Heebo,sans-serif;font-size:15px;color:#f0ede8;
    outline:none;border-radius:6px;transition:border 0.2s;
  }
  .field input:focus{border-color:rgba(184,146,42,0.6);}
  .field input::placeholder{color:#555;}

  .btn-login{
    width:100%;padding:15px;margin-top:8px;
    background:#b8922a;color:#1a1714;
    font-family:Heebo,sans-serif;font-size:15px;font-weight:900;
    border:none;cursor:pointer;border-radius:6px;
    transition:background 0.15s;
    letter-spacing:0.02em;
  }
  .btn-login:hover{background:#c9a84c;}
  .btn-login:active{transform:scale(0.98);}

  .error{
    background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);
    color:#e74c3c;padding:10px 14px;border-radius:6px;
    font-size:13px;margin-bottom:16px;display:none;
  }

  .footer-text{
    text-align:center;margin-top:24px;
    font-size:11px;color:#555;
  }

  /* loading spinner */
  .spinner{
    display:none;width:20px;height:20px;border:2px solid rgba(26,23,20,0.3);
    border-top-color:#1a1714;border-radius:50%;animation:spin 0.7s linear infinite;
    margin:0 auto;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-text">Luz<span>Glass</span></div>
    <div class="logo-sub">מפעל עיבוד זכוכית</div>
  </div>

  <div class="error" id="errMsg">שם משתמש או סיסמה שגויים</div>

  <div class="field">
    <label>שם משתמש / טלפון</label>
    <input type="text" id="username" placeholder="054-1234567" autocomplete="username"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <div class="field">
    <label>סיסמה</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="btn-login" onclick="doLogin()">
    <span id="btnLabel">כניסה</span>
    <div class="spinner" id="spinner"></div>
  </button>

</div>

<div class="footer-text">© 2026 LuzGlass · כל הזכויות שמורות</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-db.js?v=20260511"></script>
<script>
// ── redirect אם כבר מחובר (sessionStorage — לא דורש Firebase) ──────────
(function(){
  const s = lgGetSession();
  if(s.role === 'admin')  { window.location.href = 'admin.html';  return; }
  if(s.role === 'client') { window.location.href = 'portal.html'; return; }
})();

// ── אתחול Firebase — לפני שהכפתור פעיל ───────────────────────────────
const _loginBtn = document.querySelector('.btn-login');
_loginBtn.disabled = true;
document.getElementById('btnLabel').textContent = 'מתחבר...';

lgInitMainAdmin()
  .catch(e => console.warn('[login] init admin:', e))
  .finally(() => {
    _loginBtn.disabled = false;
    document.getElementById('btnLabel').textContent = 'כניסה';
  });

// ── התחברות ────────────────────────────────────────────────────────────
async function doLogin(){
  const phone    = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errEl    = document.getElementById('errMsg');
  errEl.style.display = 'none';

  if(!phone || !password){
    errEl.textContent = 'נא למלא מספר טלפון וסיסמה';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('btnLabel').style.display = 'none';
  document.getElementById('spinner').style.display  = 'block';
  _loginBtn.disabled = true;

  try {
    const user = await lgLoginByPhone(phone, password);

    if(!user){
      document.getElementById('btnLabel').style.display = 'block';
      document.getElementById('spinner').style.display  = 'none';
      _loginBtn.disabled = false;
      errEl.textContent = 'מספר טלפון או סיסמה שגויים';
      errEl.style.display = 'block';
      document.getElementById('password').value = '';
      return;
    }

    lgSetSession({
      id:          user.id,
      name:        user.name,
      role:        user.role,
      phone:       user.phone || '',
      isMainAdmin: !!user.isMainAdmin,
      loginTime:   Date.now()
    });
    window.location.href = user.role === 'admin' ? 'admin.html' : 'portal.html';

  } catch(err){
    console.error('[login] error:', err);
    document.getElementById('btnLabel').style.display = 'block';
    document.getElementById('spinner').style.display  = 'none';
    _loginBtn.disabled = false;
    errEl.textContent = 'שגיאת חיבור לשרת — בדוק חיבור אינטרנט ונסה שוב';
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
