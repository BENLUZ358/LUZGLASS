<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LuzGlass — בונה סקיצות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--bg2:#ede9e1;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#1a1714;--muted:#8a8278;--gold:#b8922a;--blue:#2980b9;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;}
.topbar .ti{font-size:15px;font-weight:700;}.topbar .su{font-size:11px;color:var(--muted);}
.logo{font-size:16px;font-weight:900;}.logo span{color:var(--gold);}
.mode-tabs{display:flex;gap:2px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);}
.mode-tab{flex:1;padding:9px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;border:1px solid transparent;cursor:pointer;text-align:center;color:var(--muted);background:var(--bg);}
.mode-tab.active{background:var(--text);color:#f7f4ef;}
.canvas-wrap{background:var(--surface);margin:10px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.06);position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:auto;cursor:pointer;}
.dim-tip{position:absolute;background:var(--gold);color:#fff;padding:2px 7px;font-size:10px;font-weight:700;border-radius:3px;pointer-events:none;display:none;z-index:5;}
.controls{margin:0 10px 10px;display:flex;flex-direction:column;gap:2px;}
.cs{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.ch{padding:11px 14px;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:var(--bg);}
.ch .arr{font-size:10px;transition:transform 0.2s;color:var(--muted);}
.ch.open .arr{transform:rotate(180deg);}
.cb{padding:12px 14px;display:none;flex-direction:column;gap:8px;border-top:1px solid var(--border);}
.cb.open{display:flex;}
.row{display:flex;align-items:center;gap:8px;}
.row label{font-size:13px;color:var(--muted);flex:1;}
.row input[type=number],.row select{width:80px;padding:8px 9px;background:var(--bg);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);outline:none;text-align:center;-webkit-appearance:none;border-radius:0;}
.row input:focus,.row select:focus{border-color:var(--gold);}
.row input.hi{border-color:var(--gold);background:rgba(184,146,42,0.07);}
.unit{font-size:11px;color:var(--muted);width:20px;}
.tog{display:flex;gap:4px;}
.tb{flex:1;padding:8px 4px;background:var(--bg);border:1px solid transparent;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.15s;}
.tb.active{background:var(--bg2);border-color:var(--gold);color:var(--text);}
.sw-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.sw{cursor:pointer;background:none;border:2px solid transparent;padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:3px;}
.sw.active{border-color:var(--gold);}
.sw-dot{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);}
.sw-name{font-size:9px;color:var(--muted);text-align:center;line-height:1.3;}
.sw-price{font-size:9px;color:var(--gold);font-weight:700;}
.sw.active .sw-name{color:var(--text);font-weight:600;}
.sub{margin-top:4px;padding:10px;background:var(--bg2);border:1px solid var(--border);display:flex;flex-direction:column;gap:7px;}
.sub-t{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;}
.sn-wrap{margin:0 10px 8px;}
.sn-input{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);outline:none;}
.sn-input:focus{border-color:var(--gold);}
.combo-wrap{padding:10px;background:var(--surface);border-bottom:1px solid var(--border);}
.cat-tabs{display:flex;gap:2px;margin-bottom:8px;}
.cat-tab{flex:1;padding:7px 4px;background:var(--bg);border:1px solid transparent;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;}
.cat-tab.active{background:var(--bg2);border-color:var(--gold);color:var(--text);}
.combo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.combo-btn{padding:9px 6px;background:var(--bg);border:1px solid transparent;font-family:'Heebo',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;line-height:1.5;}
.combo-btn.active{background:var(--bg2);border-color:var(--gold);color:var(--text);font-weight:700;}
/* ITEM MODE */
.item-list{margin:0 10px;display:flex;flex-direction:column;gap:4px;}
.ic{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.ic-hdr{padding:10px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.ic-num{width:22px;height:22px;background:var(--gold);color:#fff;border-radius:50%;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic-title{font-size:13px;font-weight:700;flex:1;}
.ic-sub{font-size:10px;color:var(--muted);}
.ic-del{padding:3px 8px;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.2);color:#c0392b;font-family:'Heebo',sans-serif;font-size:10px;cursor:pointer;border-radius:2px;}
.ic-body{padding:12px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.add-grid{margin:8px 10px;display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.add-btn{padding:11px 7px;background:var(--surface);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.add-btn:hover{background:var(--bg2);border-color:var(--gold);color:var(--text);}
.add-btn .ai{font-size:18px;}
.finish-btn{margin:6px 10px;padding:13px;background:var(--text);color:#f7f4ef;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;width:calc(100% - 20px);}
.finish-btn:hover{background:var(--gold);}
.specs{background:var(--surface);border:1px solid var(--border);margin:0 10px;padding:12px 14px;font-size:13px;line-height:1.85;color:var(--muted);border-right:3px solid var(--gold);}
.specs strong{color:var(--text);font-weight:700;font-size:13px;display:block;margin-bottom:4px;}
.btns{margin:10px;display:flex;gap:7px;}
.btn-add{flex:2;padding:14px;background:var(--gold);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.btn-dl{flex:1;padding:14px;background:var(--text);color:var(--bg);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;border:none;cursor:pointer;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#f7f4ef;padding:11px 20px;font-size:13px;font-weight:600;border-right:3px solid var(--gold);opacity:0;transition:all 0.3s;z-index:99;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.spacer{height:28px;}
</style>
</head>
<body>
<div class="topbar">
  <div><div class="ti">בונה סקיצות</div><div class="su">LuzGlass</div></div>
  <div class="logo">Luz<span>Glass</span></div>
</div>
<div class="mode-tabs">
  <button class="mode-tab active" id="mTab1" onclick="setMode('combo')">⬡ קומבינציה</button>
  <button class="mode-tab" id="mTab2" onclick="setMode('item')">＋ פריט פריט</button>
</div>
<div class="sn-wrap" style="margin-top:10px;">
  <input class="sn-input" id="sketchName" placeholder="שם / מספר סקיצה" oninput="draw()">
</div>
<div class="canvas-wrap">
  <canvas id="sk"></canvas>
  <div class="dim-tip" id="dimTip"></div>
</div>

<!-- COMBO UI -->
<div id="comboUI">
  <div class="combo-wrap">
    <div class="cat-tabs">
      <button class="cat-tab active" onclick="setCat('pinati',this)">פינתי</button>
      <button class="cat-tab" onclick="setCat('hazit',this)">חזיתי</button>
      <button class="cat-tab" onclick="setCat('ambatyon',this)">אמבטיון</button>
      <button class="cat-tab" onclick="setCat('kavua',this)">קבוע</button>
    </div>
    <div class="combo-grid" id="comboGrid"></div>
  </div>
  <div class="controls" id="comboCtrl"></div>
</div>

<!-- ITEM UI -->
<div id="itemUI" style="display:none;">
  <div class="item-list" id="itemList"></div>
  <div class="add-grid">
    <button class="add-btn" onclick="addItem('fixed')"><span class="ai">⬡</span>קבוע</button>
    <button class="add-btn" onclick="addItem('door')"><span class="ai">🚪</span>דלת</button>
    <button class="add-btn" onclick="addItem('shape')"><span class="ai">▭</span>צורה</button>
    <button class="add-btn" onclick="addItem('mirror')"><span class="ai">🪞</span>מראה</button>
  </div>
  <button class="finish-btn" onclick="showToast('✓ סקיצה מוכנה!')">✓ סיים סקיצה</button>
</div>

<!-- SHARED CONTROLS -->
<div class="controls">
  <div class="cs">
    <div class="ch" onclick="tog(this)"><span>זכוכית</span><span class="arr">▾</span></div>
    <div class="cb"><div class="sw-grid" id="gSw"></div></div>
  </div>
  <div class="cs">
    <div class="ch" onclick="tog(this)"><span>פרזול</span><span class="arr">▾</span></div>
    <div class="cb">
      <div class="sw-grid" id="fSw"></div>
      <div class="tog" style="margin-top:4px">
        <button class="tb active" id="bZ" onclick="setQ('zamak')">זאמק</button>
        <button class="tb" id="bP" onclick="setQ('pliz')">פליז ✦</button>
      </div>
    </div>
  </div>
  <div class="cs">
    <div class="ch" onclick="tog(this)"><span>תוספות</span><span class="arr">▾</span></div>
    <div class="cb"><div class="tog"><button class="tb" id="bSand" onclick="toggleSand()">התזת חול</button></div></div>
  </div>
</div>
<div class="specs" id="specs"><strong>פרטי הזמנה</strong>בחר מקלחון</div>
<div class="btns">
  <button class="btn-add" onclick="addToOrder()">＋ הוסף להזמנה</button>
  <button class="btn-dl" onclick="dlPNG()">📥 PNG</button>
</div>
<div class="toast" id="toast"></div>
<div class="spacer"></div>

<script>
// ══════════════ DATA ══════════════
const GL=[
  {id:'shafu',name:'שקוף',price:200,dot:'rgba(210,230,245,0.6)'},
  {id:'klir',name:'קליר',price:260,dot:'rgba(195,225,245,0.9)'},
  {id:'granit',name:'גרניט',price:260,dot:'linear-gradient(135deg,#bbb,#d5d5d5,#a0a0a0)'},
  {id:'asid',name:'אסיד',price:260,dot:'rgba(245,245,250,0.8)',b:'2px solid rgba(200,200,215,0.8)'},
  {id:'afor',name:'אפור',price:260,dot:'rgba(120,125,135,0.7)'},
  {id:'bronze',name:'ברונזה',price:260,dot:'rgba(130,90,50,0.6)'},
  {id:'pipita',name:'פיפיטה',price:260,dot:'repeating-linear-gradient(45deg,rgba(160,160,160,0.5) 0,rgba(160,160,160,0.5) 2px,rgba(230,230,230,0.7) 2px,rgba(230,230,230,0.7) 8px)'},
  {id:'asidk',name:'אסיד קליר',price:320,dot:'rgba(242,244,250,0.8)',b:'2px solid rgba(220,225,240,0.9)'},
  {id:'gals',name:'גלינה שקוף',price:350,dot:'linear-gradient(135deg,rgba(195,220,240,0.8),rgba(175,210,235,0.95))'},
  {id:'galk',name:'גלינה קליר',price:400,dot:'linear-gradient(135deg,rgba(200,228,248,0.9),rgba(215,238,252,1))'},
];
const FN=[
  {id:'shahor',name:'שחור מט',dot:'#2a2a2a',pZ:800,pP:1400},
  {id:'zahavM',name:'זהב מוברש',dot:'linear-gradient(135deg,#b8932a,#a07820)',pZ:900,pP:1600},
  {id:'zahav',name:'זהב',dot:'linear-gradient(135deg,#d4af37,#f0d060)',pZ:900,pP:1600},
  {id:'grafit',name:'גרפיט',dot:'linear-gradient(135deg,#52525e,#6a6a78)',pZ:850,pP:1500},
  {id:'rose',name:'רוז גולד',dot:'linear-gradient(135deg,#c0748a,#d8909e)',pZ:950,pP:1700},
];

// COMBOS: wallSide = side that has wall brackets
// hingeOnFixed = true means hinge mark also appears on adjacent fixed panel
const COMBOS={
  pinati:[
    {id:'p_2k2d',label:'2 קבועים 2 דלתות',panels:[
      {type:'fixed',label:'קבוע א',wallSide:'right'},
      {type:'door', label:'דלת א', hingeSide:'right',handleSide:'left',swingDir:'left',hingeOnFixed:'prev'},
      {type:'door', label:'דלת ב', hingeSide:'left', handleSide:'right',swingDir:'right',hingeOnFixed:'next'},
      {type:'fixed',label:'קבוע ב',wallSide:'left'},
    ]},
    {id:'p_kd',label:'קבוע ודלת',panels:[
      {type:'fixed',label:'קבוע',wallSide:'right'},
      {type:'door', label:'דלת', hingeSide:'left',handleSide:'right',swingDir:'left',hingeOnFixed:'prev'},
    ]},
    {id:'p_k2d',label:'קבוע 2 דלתות',panels:[
      {type:'fixed',label:'קבוע',wallSide:'right'},
      {type:'door', label:'דלת א',hingeSide:'left',handleSide:'right',swingDir:'left',hingeOnFixed:'prev'},
      {type:'door', label:'דלת ב',hingeSide:'right',handleSide:'left',swingDir:'right'},
    ]},
    {id:'p_2kd',label:'2 קבועים ודלת',panels:[
      {type:'fixed',label:'קבוע א',wallSide:'right',glassGlass:'left'},
      {type:'fixed',label:'קבוע ב',wallSide:'none',glassGlass:'right',hingeMarks:'right'},
      {type:'door', label:'דלת',   hingeSide:'left',handleSide:'right',swingDir:'left',hingeOnFixed:'prev'},
    ]},
  ],
  hazit:[
    {id:'h_2k2d',label:'2 קבועים 2 דלתות',panels:[
      {type:'fixed',label:'קבוע א',wallSide:'right'},
      {type:'door', label:'דלת א', hingeSide:'left',handleSide:'right',swingDir:'out',hingeOnFixed:'prev'},
      {type:'door', label:'דלת ב', hingeSide:'right',handleSide:'left',swingDir:'out',hingeOnFixed:'next'},
      {type:'fixed',label:'קבוע ב',wallSide:'left'},
    ]},
    {id:'h_3k2d',label:'3 קבועים 2 דלתות',panels:[
      {type:'fixed',label:'קבוע א',wallSide:'right'},
      {type:'door', label:'דלת א', hingeSide:'left', handleSide:'right',swingDir:'out',hingeOnFixed:'prev'},
      {type:'fixed',label:'קבוע ב',wallSide:'none', hingeMarks:'both'},
      {type:'door', label:'דלת ב', hingeSide:'right',handleSide:'left', swingDir:'out',hingeOnFixed:'next'},
      {type:'fixed',label:'קבוע ג',wallSide:'left'},
    ]},
    {id:'h_2kd',label:'2 קבועים ודלת',panels:[
      {type:'fixed',label:'קבוע א',wallSide:'right'},
      {type:'door', label:'דלת',   hingeSide:'left',handleSide:'right',swingDir:'out',hingeOnFixed:'prev'},
      {type:'fixed',label:'קבוע ב',wallSide:'left'},
    ]},
    {id:'h_kd',label:'קבוע ודלת',panels:[
      {type:'fixed',label:'קבוע',wallSide:'right'},
      {type:'door', label:'דלת', hingeSide:'left',handleSide:'right',swingDir:'out',hingeOnFixed:'prev'},
    ]},
    {id:'h_2d',label:'2 דלתות',panels:[
      {type:'door',label:'דלת א',hingeSide:'right',handleSide:'left',swingDir:'out'},
      {type:'door',label:'דלת ב',hingeSide:'left', handleSide:'right',swingDir:'out'},
    ]},
    {id:'h_k',label:'קבוע בלבד',panels:[{type:'fixed',label:'קבוע',wallSide:'both'}]},
  ],
  ambatyon:[
    {id:'a_maleh',label:'סגירה מלאה',panels:[
      {type:'fixed',label:'קבוע א',wallSide:'right'},
      {type:'door', label:'דלת',   hingeSide:'left',handleSide:'right',swingDir:'out',hingeOnFixed:'prev'},
      {type:'fixed',label:'קבוע ב',wallSide:'left'},
    ]},
    {id:'a_dk',label:'דלת וקבוע',panels:[
      {type:'door', label:'דלת',   hingeSide:'right',handleSide:'left',swingDir:'out'},
      {type:'fixed',label:'קבוע', wallSide:'left'},
    ]},
    {id:'a_k',label:'קבוע בלבד',panels:[{type:'fixed',label:'קבוע',wallSide:'both'}]},
    {id:'a_d',label:'דלת בלבד',panels:[{type:'door',label:'דלת',hingeSide:'right',handleSide:'left',swingDir:'out'}]},
    {id:'a_hzaza',label:'הזזה',panels:[
      {type:'fixed', label:'קבוע',wallSide:'right'},
      {type:'slider',label:'הזזה',dir:'left'},
    ]},
  ],
  kavua:[{id:'k_s',label:'קבוע בודד',panels:[{type:'fixed',label:'קבוע',wallSide:'both'}]}],
};

// ══════════════ STATE ══════════════
const C=document.getElementById('sk'),cx=C.getContext('2d');
let selG='shafu',selF='shahor',selQ='zamak',sand=false;
let appMode='combo',curCat='pinati',curCombo=COMBOS.pinati[0];
let panelState={}, items=[], dimHits=[];

function mkPS(panel){
  return {
    w:panel.type==='door'?80:panel.type==='slider'?80:50, h:200,
    // hinge
    extraHinge:false,hinge3pos:40,
    // brackets
    extraBracket:false,bracket3pos:40,bracketType:'normal',floorBracket:false,
    // handle
    handleType:'knob',handleEdge:6,towelSpacing:55,
    // slope
    hasSlope:false,
    slopeAxis:'height',   // 'height' or 'width'
    slopeSide:'right',    // which side is SHORTER (right/left for height, top/bottom for width)
    slopeH1:200,          // main height (left side for height-slope, or top for width-slope)
    slopeH2:180,          // other side
    // holes
    holes:[],
    // recess
    hasRecess:false,recessW:12,recessH:9,recessFromTop:0,recessFromSide:0,
  };
}
function initPS(){panelState={};curCombo.panels.forEach((p,i)=>panelState[i]=mkPS(p));}

// ══════════════ HELPERS ══════════════
function tog(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function v(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function setQ(q){selQ=q;document.getElementById('bZ').classList.toggle('active',q==='zamak');document.getElementById('bP').classList.toggle('active',q==='pliz');draw();}
function toggleSand(){sand=!sand;document.getElementById('bSand').classList.toggle('active',sand);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function getPS(pfx,i){return pfx==='combo'?panelState[i]:items[i];}

function setPSv(pfx,i,k,el){const ps=getPS(pfx,i);if(!ps)return;ps[k]=parseFloat(el.value)||0;draw();}
function setPSb(pfx,i,k,val){const ps=getPS(pfx,i);if(!ps)return;ps[k]=val;if(pfx==='combo')renderPanelCtrl();else renderItemList();draw();}
function setPSs(pfx,i,k,val){const ps=getPS(pfx,i);if(!ps)return;ps[k]=typeof val==='string'?val:val.value;if(pfx==='combo')renderPanelCtrl();else renderItemList();draw();}
function addHole(pfx,i){const ps=getPS(pfx,i);if(!ps)return;if(!ps.holes)ps.holes=[];ps.holes.push({diam:12,fromTop:100,fromRight:10});if(pfx==='combo')renderPanelCtrl();else renderItemList();draw();}
function rmHole(pfx,i,hi){const ps=getPS(pfx,i);if(!ps)return;ps.holes.splice(hi,1);if(pfx==='combo')renderPanelCtrl();else renderItemList();draw();}
function setHole(pfx,i,hi,k,el){const ps=getPS(pfx,i);if(ps&&ps.holes[hi])ps.holes[hi][k]=parseFloat(el.value)||0;draw();}

// ══════════════ MODE ══════════════
function setMode(m){
  appMode=m;
  document.getElementById('mTab1').classList.toggle('active',m==='combo');
  document.getElementById('mTab2').classList.toggle('active',m==='item');
  document.getElementById('comboUI').style.display=m==='combo'?'':'none';
  document.getElementById('itemUI').style.display=m==='item'?'':'none';
  draw();
}
function setCat(cat,btn){
  curCat=cat;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curCombo=COMBOS[cat][0];
  renderCombos();initPS();renderPanelCtrl();draw();
}
function renderCombos(){
  document.getElementById('comboGrid').innerHTML=COMBOS[curCat].map(c=>`
    <button class="combo-btn ${c.id===curCombo.id?'active':''}" onclick="selCombo('${c.id}')">${c.label}</button>`).join('');
}
function selCombo(id){
  const all=Object.values(COMBOS).flat();
  curCombo=all.find(c=>c.id===id)||curCombo;
  renderCombos();initPS();renderPanelCtrl();draw();
}

      <button class="tb" onclick="setPSb('${pfx}',${i},'hasSlope',true)">+ שיפוע</button>
    </div>`;
  const isH=ps.slopeAxis==='height';
  return `
    <div class="tog">
      <button class="tb" onclick="setPSb('${pfx}',${i},'hasSlope',false)">ללא שיפוע</button>
      <button class="tb active" onclick="setPSb('${pfx}',${i},'hasSlope',true)">+ שיפוע</button>
    </div>
    <div class="row"><label>סוג שיפוע</label>
      <select onchange="setPSs('${pfx}',${i},'slopeAxis',this)" style="width:130px">
        <option value="height" ${isH?'selected':''}>גובה (שמאל≠ימין)</option>
        <option value="width" ${!isH?'selected':''}>רוחב (עליון≠תחתון)</option>
      </select><span class="unit"></span></div>

    <div class="row"><label>גובה צד שמאל</label>

      <select onchange="setPSs('${pfx}',${i},'slopeSide',this)" style="width:110px">

      <span class="unit">ס״מ</span></div>
    <div class="row"><label>גובה${ps.hasSlope&&ps.slopeAxis==='height'?' (שמאל)':''}</label>
      <input type="number" id="${pfx}_h_${i}" value="${ps.h}" min="50" max="400"
        oninput="setPSv('${pfx}',${i},'h',this);this.classList.add('hi')" onblur="this.classList.remove('hi')">
      <span class="unit">ס״מ</span></div>`;

  if(isDoor){
    h+=`

      <div class="tog" style="flex:1">
        <button class="tb ${!ps.extraHinge?'active':''}" onclick="setPSb('${pfx}',${i},'extraHinge',false)">2 סטנד׳</button>
        <button class="tb ${ps.extraHinge?'active':''}" onclick="setPSb('${pfx}',${i},'extraHinge',true)">3 צירים</button>
      </div></div>
    ${ps.extraHinge?`<div class="row"><label>ציר 3 מלמעלה</label>
      <input type="number" id="${pfx}_hg3_${i}" value="${ps.hinge3pos}" min="10" max="200" oninput="setPSv('${pfx}',${i},'hinge3pos',this)">
      <span class="unit">ס״מ</span></div>`:''}
    <div class="row"><label>ידית</label>
      <div class="tog" style="flex:1">
        <button class="tb ${ps.handleType==='knob'?'active':''}" onclick="setPSs('${pfx}',${i},'handleType','knob')">כפתור</button>
        <button class="tb ${ps.handleType==='towel'?'active':''}" onclick="setPSs('${pfx}',${i},'handleType','towel')">מגבת</button>
      </div></div>
    <div class="row"><label>מרחק מקצה</label>
      <input type="number" id="${pfx}_hEd_${i}" value="${ps.handleEdge}" min="3" max="30" oninput="setPSv('${pfx}',${i},'handleEdge',this)">
      <span class="unit">ס״מ</span></div>
    ${ps.handleType==='towel'?`<div class="row"><label>מרחק בין חורים</label>
      <input type="number" value="${ps.towelSpacing}" min="20" max="120" oninput="setPSv('${pfx}',${i},'towelSpacing',this)">
      <span class="unit">ס״מ</span></div>`:''}`;
  }
  if(isFixed){
    const ws=panel.wallSide||ps.wallSide||'both';
    const showBrackets=ws!=='none';
    if(showBrackets) h+=`
    <div class="row"><label>זוויות קיר</label>
      <div class="tog" style="flex:1">
        <button class="tb ${!ps.extraBracket?'active':''}" onclick="setPSb('${pfx}',${i},'extraBracket',false)">2 סטנד׳</button>
        <button class="tb ${ps.extraBracket?'active':''}" onclick="setPSb('${pfx}',${i},'extraBracket',true)">3 זוויות</button>
      </div></div>
    ${ps.extraBracket?`<div class="row"><label>זווית 3 מלמעלה</label>
      <input type="number" value="${ps.bracket3pos}" min="10" max="200" oninput="setPSv('${pfx}',${i},'bracket3pos',this)">
      <span class="unit">ס״מ</span></div>`:''}
    <div class="row"><label>סוג זווית</label>
      <select onchange="setPSs('${pfx}',${i},'bracketType',this)" style="width:130px">

      <div class="tog" style="flex:1">

function addItem(type){
  const fakePanel={type,label:({fixed:'קבוע',door:'דלת',shape:'צורה',mirror:'מראה'}[type])||type,wallSide:'both',hingeSide:'right',handleSide:'left'};
  const ps=mkPS(fakePanel);
  ps._panel=fakePanel;
  items.push(ps);
  renderItemList(); draw();
}
function removeItem(i){items.splice(i,1);renderItemList();draw();}
function renderItemList(){
  const el=document.getElementById('itemList'); el.innerHTML='';
  items.forEach((ps,i)=>{
    const panel=ps._panel||{type:ps.type||'fixed',label:'פריט',wallSide:'both',hingeSide:'right',handleSide:'left'};

// ══════════════ DRAW ENGINE ══════════════
function getPanels(){return appMode==='combo'?curCombo.panels:items.map(it=>it._panel||{type:'fixed',label:'פריט',wallSide:'both'});}
function getPStates(){
  if(appMode==='combo') return panelState;
  return Object.fromEntries(items.map((it,i)=>[i,it]));
}

function draw(){
  const panels=getPanels(), pss=getPStates();
  if(!panels.length){drawEmpty();return;}

  const DPR=window.devicePixelRatio||1;
  const cW=C.parentElement.clientWidth;

  // In item mode, draw panels SEPARATELY (stacked vertically)
  if(appMode==='item'){
    drawItemMode(panels,pss,DPR,cW); return;
  }
  drawComboMode(panels,pss,DPR,cW);
}

function drawComboMode(panels,pss,DPR,cW){
  const MG=64;
  const totalW=panels.reduce((s,_,i)=>s+(pss[i]?.w||50),0);
  // max height considering slopes
  const maxH=Math.max(...panels.map((_,i)=>{
    const ps=pss[i]||{}; return Math.max(ps.h||200, ps.slopeH1||0, ps.slopeH2||0);
  }));
  const sc=(cW-MG*2)/Math.max(totalW,1);
  const cH=maxH*sc+MG*2+36;
  setupCanvas(DPR,cW,cH);
  drawGrid(cW,cH);
  dimHits=[];

  const startX=MG+(cW-MG*2-totalW*sc)/2;
  let curX=startX;
  const oy=MG;

  panels.forEach((panel,i)=>{
    const ps=pss[i]||{}; const pw=(ps.w||50)*sc;
    const {ph,poly}=getPanelShape(ps,pw,sc);
    drawSinglePanel(panel,ps,curX,oy,pw,ph,sc,poly,i,'combo',panels,pss);
    curX+=pw;
  });

  if(panels.length>1){
    dLine(startX,oy,startX+totalW*sc,oy,`${totalW} ס״מ`,-52,true,null);
  }
  drawTitleBar(cW,cH);
  updateSpecs();
}

function drawItemMode(panels,pss,DPR,cW){
  const MG=64, GAP=40;
  const maxW=Math.max(...panels.map((_,i)=>(pss[i]?.w||50)));
  const sc=(cW-MG*2)/Math.max(maxW+20,1);
  // total height = sum of each panel height + gaps
  let totalH=MG;
  const panelHeights=panels.map((_,i)=>{
    const ps=pss[i]||{};
    const h=Math.max(ps.h||200,ps.slopeH1||0,ps.slopeH2||0);
    return h*sc;
  });
  totalH+=panelHeights.reduce((s,h)=>s+h+GAP,0)+36;

  setupCanvas(DPR,cW,totalH);
  drawGrid(cW,totalH);
  dimHits=[];

  let curY=MG;
  panels.forEach((panel,i)=>{
    const ps=pss[i]||{};
    const pw=(ps.w||50)*sc;
    const x=MG+(cW-MG*2-pw)/2;
    const {ph,poly}=getPanelShape(ps,pw,sc);
    drawSinglePanel(panel,ps,x,curY,pw,ph,sc,poly,i,'item',panels,pss);
    curY+=ph+GAP;
  });

  drawTitleBar(cW,totalH);
  updateSpecs();
}

function setupCanvas(DPR,cW,cH){
  C.width=cW*DPR; C.height=cH*DPR;
  C.style.width=cW+'px'; C.style.height=cH+'px';
  cx.setTransform(1,0,0,1,0,0);
  cx.scale(DPR,DPR);
  cx.clearRect(0,0,cW,cH);
  cx.fillStyle='#fff'; cx.fillRect(0,0,cW,cH);
}
function drawGrid(cW,cH){
  cx.strokeStyle='rgba(0,0,0,0.025)'; cx.lineWidth=1;
  const gs=30;
  for(let x=0;x<cW;x+=gs){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cH);cx.stroke();}
  for(let y=0;y<cH;y+=gs){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cW,y);cx.stroke();}
}
function drawEmpty(){
  const DPR=window.devicePixelRatio||1,cW=C.parentElement.clientWidth,cH=160;
  setupCanvas(DPR,cW,cH);
  cx.font='14px Heebo,sans-serif'; cx.fillStyle='#ccc'; cx.textAlign='center';
  cx.fillText('הוסף פריטים לסקיצה',cW/2,cH/2);
}

function getPanelShape(ps,pw,sc){
  const baseH=(ps.h||200)*sc;
  if(!ps.hasSlope) return {ph:baseH,poly:null};

  const h1=(ps.slopeH1||200)*sc;
  const h2=(ps.slopeH2||180)*sc;

  // For HEIGHT slope: left side = h1, right side = h2 (or vice versa based on slopeSide)
  // For WIDTH slope: top width=full, bottom is angled
  if(ps.slopeAxis==='height'){
    // slopeSide = 'right' means right side is shorter (h2<h1 typically)
    // draw as trapezoid: bottom flat, top angled
    const leftH=ps.slopeSide==='left'?h2:h1;
    const rightH=ps.slopeSide==='right'?h2:h1;
    const maxH=Math.max(leftH,rightH);
    const poly={
      tl:{x:0,y:maxH-leftH}, tr:{x:pw,y:maxH-rightH},
      br:{x:pw,y:maxH}, bl:{x:0,y:maxH}
    };
    return {ph:maxH,poly};
  } else {
    // WIDTH slope: top full width, bottom is cut (trapezoid horizontal)
    const topW=pw;
    const shortSide=ps.slopeSide==='bottom'?h2:h1;
    const tallSide=ps.slopeSide==='bottom'?h1:h2;
    const ph=Math.max(h1,h2);
    // For simplicity: left & right full height, top/bottom angled
    const poly={
      tl:{x:0,y:0}, tr:{x:pw,y:0},
      br:{x:pw,y:h2}, bl:{x:0,y:h1}
    };
    return {ph:Math.max(h1,h2),poly};
  }
}

function drawSinglePanel(panel,ps,x,y,pw,ph,sc,poly,idx,pfx,allPanels,allPS){
  const isDoor=panel.type==='door', isFixed=panel.type==='fixed'||panel.type==='mirror';
  const isSlider=panel.type==='slider';

  // Build clip path
  cx.save();
  cx.beginPath();
  if(poly){
    cx.moveTo(x+poly.tl.x,y+poly.tl.y);
    cx.lineTo(x+poly.tr.x,y+poly.tr.y);
    cx.lineTo(x+poly.br.x,y+poly.br.y);
    cx.lineTo(x+poly.bl.x,y+poly.bl.y);
    cx.closePath();
  } else {
    cx.rect(x,y,pw,ph);
  }
  cx.clip();

  // Glass fill
  cx.fillStyle=isDoor?'rgba(180,215,240,0.22)':isSlider?'rgba(200,220,240,0.15)':'rgba(180,215,240,0.12)';
  cx.fillRect(x-2,y-2,pw+4,ph+4);
  // Hatch
  cx.strokeStyle='rgba(42,90,138,0.07)'; cx.lineWidth=1;
  for(let xi=0;xi<pw+10;xi+=10){
    cx.beginPath();cx.moveTo(x+xi,y);cx.lineTo(x+xi+5,y+5);cx.stroke();
    cx.beginPath();cx.moveTo(x+xi,y+ph);cx.lineTo(x+xi+5,y+ph-5);cx.stroke();
  }
  cx.restore();

  // Border
  cx.strokeStyle='#2a5a8a'; cx.lineWidth=isDoor?2.5:2;
  if(poly){
    cx.beginPath();
    cx.moveTo(x+poly.tl.x,y+poly.tl.y);
    cx.lineTo(x+poly.tr.x,y+poly.tr.y);
    cx.lineTo(x+poly.br.x,y+poly.br.y);
    cx.lineTo(x+poly.bl.x,y+poly.bl.y);
    cx.closePath(); cx.stroke();
  } else {
    cx.strokeRect(x,y,pw,ph);
  }

  // SLOPE DIMS — always show all 4 measurements
  if(ps.hasSlope){
    const h1=ps.slopeH1, h2=ps.slopeH2;
    if(ps.slopeAxis==='height'){
      const leftH=ps.slopeSide==='left'?h2:h1;
      const rightH=ps.slopeSide==='right'?h2:h1;
      const maxH=Math.max(leftH,rightH)*sc;
      // Left side height
      dLine(x-32,y+(maxH-leftH*sc),x-32,y+maxH,`${leftH}`,-28,false,`${pfx}_h_${idx}`);
      // Right side height  
      dLine(x+pw+32,y+(maxH-rightH*sc),x+pw+32,y+maxH,`${rightH}`,28,false,`${pfx}_sH2_${idx}`);
      // Width
      dLine(x,y+maxH,x+pw,y+maxH,`${ps.w}`,-26,true,`${pfx}_w_${idx}`);
    } else {
      const h1sc=h1*sc, h2sc=h2*sc;
      // Left side (full height)
      dLine(x-32,y,x-32,y+h1sc,`${h1}`,-28,false,`${pfx}_h_${idx}`);
      // Right side
      dLine(x+pw+32,y,x+pw+32,y+h2sc,`${h2}`,28,false,`${pfx}_sH2_${idx}`);
      // Width top
      dLine(x,y,x+pw,y,`${ps.w}`,-26,true,`${pfx}_w_${idx}`);
    }
  } else {
    // ALWAYS show width AND height
    dLine(x,y,x+pw,y,`${ps.w}`,-26,true,`${pfx}_w_${idx}`);
    // Height on right side of panel — always visible
    dLine(x+pw+4,y,x+pw+4,y+ph,`${ps.h}`,28,false,`${pfx}_h_${idx}`);
  }

  // SLIDER
  if(isSlider){
    cx.strokeStyle='rgba(42,90,138,0.25)'; cx.lineWidth=1; cx.setLineDash([4,4]);
    cx.beginPath();cx.moveTo(x+10,y+ph/2);cx.lineTo(x+pw-10,y+ph/2);cx.stroke();
    cx.setLineDash([]);
    cx.font=`${Math.max(16,sc)}px Heebo,sans-serif`;cx.textAlign='center';cx.fillStyle='rgba(42,90,138,0.35)';
    cx.fillText(panel.dir==='left'?'→':'←',x+pw/2,y+ph/2+6);
  }

  // DOOR elements
  if(isDoor){
    // Swing arc
    cx.save();cx.strokeStyle='rgba(42,90,138,0.15)';cx.lineWidth=1;cx.setLineDash([4,4]);
    if(panel.hingeSide==='left'){cx.beginPath();cx.arc(x,y+ph,pw,-Math.PI/2,-Math.PI/2+Math.PI/3);cx.stroke();}
    else{cx.beginPath();cx.arc(x+pw,y+ph,pw,-Math.PI/2,-Math.PI/2-Math.PI/3,true);cx.stroke();}
    cx.restore();

    // Hinges on door
    const hx=panel.hingeSide==='left'?x:x+pw;
    const hPos=[y+20*sc, y+ph-20*sc];
    if(ps.extraHinge) hPos.push(y+(ps.hinge3pos||40)*sc);
    hPos.forEach(hy=>drwHinge(hx,hy));

    // Hinge labels
    cx.font=`${Math.max(7,sc*0.55)}px Heebo,sans-serif`; cx.fillStyle='#b8922a';
    const hlx=panel.hingeSide==='left'?hx-4:hx+4;
    cx.textAlign=panel.hingeSide==='left'?'right':'left';
    hPos.forEach(hy=>cx.fillText('E400',hlx,hy+3));

    // Hinge distance dims
    dLine(hx+(panel.hingeSide==='left'?-24:24),y,hx+(panel.hingeSide==='left'?-24:24),y+20*sc,'20',panel.hingeSide==='left'?-18:18,false,null);
    dLine(hx+(panel.hingeSide==='left'?-24:24),y+ph-20*sc,hx+(panel.hingeSide==='left'?-24:24),y+ph,'20',panel.hingeSide==='left'?-18:18,false,null);

    // Handle
    const hEdge=(ps.handleEdge||6)*sc;
    const handleX=panel.handleSide==='right'?x+pw-hEdge:x+hEdge;
    const handleY=(ps.h||200)>200?y+100*sc:y+ph/2;
    if(ps.handleType==='towel'){
      const sp=(ps.towelSpacing||55)*sc;
      const hx2=panel.handleSide==='right'?handleX-sp:handleX+sp;
      if(hx2>x+4&&hx2<x+pw-4){
        drwHole(handleX,handleY);drwHole(hx2,handleY);
        dLine(Math.min(handleX,hx2),handleY-20,Math.max(handleX,hx2),handleY-20,`${ps.towelSpacing}`,0,true,null);
      }
    } else drwHole(handleX,handleY);

    // HINGE MARKS ON ADJACENT FIXED PANEL (hingeOnFixed)
    if(panel.hingeOnFixed&&pfx==='combo'){
      let adjIdx=-1;
      if(panel.hingeOnFixed==='prev') adjIdx=idx-1;
      else if(panel.hingeOnFixed==='next') adjIdx=idx+1;
      if(adjIdx>=0&&adjIdx<allPanels.length&&allPanels[adjIdx].type==='fixed'){
        const adjPS=allPS[adjIdx]||{};
        // calc adjacent panel x position
        let adjX=MG+(C.width/(window.devicePixelRatio||1)-MG*2-allPanels.reduce((s,_,pi)=>s+(allPS[pi]?.w||50),0)*sc)/2;
        for(let pi=0;pi<adjIdx;pi++) adjX+=(allPS[pi]?.w||50)*sc;
        const adjPW=(adjPS.w||50)*sc;
        const adjPH=(adjPS.h||200)*sc;
        // hinge marks on the side of adjacent fixed that touches this door
        const adjHX=panel.hingeOnFixed==='prev'?adjX+adjPW:adjX;
        const adjHPos=[y+20*sc,y+ph-20*sc];
        if(ps.extraHinge) adjHPos.push(y+(ps.hinge3pos||40)*sc);
        adjHPos.forEach(hy=>drwHingeOnFixed(adjHX,hy));
      }
    }
  }

  // FIXED brackets
  if(isFixed){
    const ws=panel.wallSide||ps.wallSide||'both';
    const sides=ws==='both'?['right','left']:ws==='none'?[]:ws==='right'?['right']:['left'];
    sides.forEach(side=>{
      const bx=side==='right'?x:x+pw;
      const bPos=[y+20*sc,y+ph-20*sc];
      if(ps.extraBracket) bPos.push(y+(ps.bracket3pos||40)*sc);
      bPos.forEach(by=>drwBracket(bx,by,side==='right',ps.bracketType==='open'));
      cx.font=`${Math.max(7,sc*0.5)}px Heebo,sans-serif`;cx.fillStyle='#b8922a';
      cx.textAlign=side==='right'?'left':'right';
      bPos.forEach(by=>cx.fillText(ps.bracketType==='open'?'פתוחה':'זווית',side==='right'?bx+4:bx-4,by-5));
    });

    // Glass-glass connector (between panels in pinati with 2 fixed)
    if(panel.glassGlass){
      const gx=panel.glassGlass==='left'?x:x+pw;
      [y+20*sc,y+ph-20*sc].forEach(by=>drwGGBracket(gx,by));
    }
    // hingeMarks on fixed (e.g. middle fixed in 3k2d)
    if(panel.hingeMarks){
      const sides2=panel.hingeMarks==='both'?['right','left']:panel.hingeMarks==='right'?['right']:['left'];
      sides2.forEach(side=>{
        const hx2=side==='right'?x+pw:x;
        [y+20*sc,y+ph-20*sc].forEach(hy=>drwHingeOnFixed(hx2,hy));
      });
    }
    if(ps.floorBracket) drwFloorBracket(x+pw/2,y+ph);
  }

  // HOLES
  (ps.holes||[]).forEach((hole)=>{
    const hr=Math.max(4,(hole.diam||12)/2/10*sc);
    const hx2=x+pw-(hole.fromRight||0)*sc;
    const hy2=y+(hole.fromTop||0)*sc;
    cx.beginPath();cx.arc(hx2,hy2,hr,0,Math.PI*2);
    cx.fillStyle='rgba(41,128,185,0.15)';cx.fill();
    cx.strokeStyle='#2980b9';cx.lineWidth=1.5;cx.stroke();
    cx.beginPath();cx.moveTo(hx2-hr-3,hy2);cx.lineTo(hx2+hr+3,hy2);cx.stroke();
    cx.beginPath();cx.moveTo(hx2,hy2-hr-3);cx.lineTo(hx2,hy2+hr+3);cx.stroke();
    cx.font='bold 8px Heebo,sans-serif';cx.fillStyle='#2980b9';cx.textAlign='center';
    cx.fillText(`⌀${hole.diam}מ״מ`,hx2,hy2+hr+11);
    dLine(hx2,y,hx2,hy2,`${hole.fromTop||0}`,20,false,null);
    dLine(hx2,hy2,x+pw,hy2,`${hole.fromRight||0}`,14,true,null);
  });

  // RECESS
  if(ps.hasRecess&&(ps.recessW||12)){
    const rx=x+pw-(ps.recessFromSide||0)*sc-(ps.recessW||12)*sc;
    const ry=y+(ps.recessFromTop||0)*sc;
    const rw=(ps.recessW||12)*sc, rh=(ps.recessH||9)*sc;
    cx.fillStyle='rgba(192,57,43,0.08)';cx.fillRect(rx,ry,rw,rh);
    cx.strokeStyle='#c0392b';cx.lineWidth=1.5;cx.setLineDash([3,2]);
    cx.strokeRect(rx,ry,rw,rh);cx.setLineDash([]);
    cx.font='bold 8px Heebo,sans-serif';cx.fillStyle='#c0392b';cx.textAlign='center';
    cx.fillText(`פינוי ${ps.recessW||12}×${ps.recessH||9}`,rx+rw/2,ry+rh/2+3);
    dLine(rx,y,rx,ry,`${ps.recessFromTop||0}`,-18,false,null);
    dLine(rx,ry,rx+rw,ry,`${ps.recessW||12}`,-16,true,null);
  }

  // Panel label
  cx.font=`bold ${Math.max(10,Math.min(12,sc*0.9))}px Heebo,sans-serif`;
  cx.textAlign='center';cx.fillStyle='#2a5a8a';
  cx.fillText(panel.label||panel.type,x+pw/2,y+ph/2+4);
}

// ══════════════ DRAW HELPERS ══════════════
function drwHinge(x,y){
  const hw=7,hh=14;
  cx.fillStyle='#b8922a';cx.fillRect(x-hw/2,y-hh/2,hw,hh);
  cx.strokeStyle='#7a5e10';cx.lineWidth=1;cx.strokeRect(x-hw/2,y-hh/2,hw,hh);
  cx.fillStyle='#fff';cx.beginPath();cx.arc(x,y,2,0,Math.PI*2);cx.fill();
}
function drwHingeOnFixed(x,y){
  // hinge mark on fixed panel — smaller, hollow
  const hw=6,hh=12;
  cx.strokeStyle='#b8922a';cx.lineWidth=1.5;cx.strokeRect(x-hw/2,y-hh/2,hw,hh);
  cx.fillStyle='rgba(184,146,42,0.15)';cx.fillRect(x-hw/2,y-hh/2,hw,hh);
  cx.fillStyle='#b8922a';cx.beginPath();cx.arc(x,y,2,0,Math.PI*2);cx.fill();
}
function drwBracket(x,y,fR,open){
  const s=10;
  cx.strokeStyle='#b8922a';cx.lineWidth=2.5;cx.setLineDash([]);
  if(open) cx.setLineDash([3,3]);
  cx.beginPath();fR?cx.moveTo(x+s,y):cx.moveTo(x-s,y);cx.lineTo(x,y);cx.lineTo(x,y+s);cx.stroke();
  cx.setLineDash([]);
  cx.fillStyle='#b8922a';cx.beginPath();cx.arc(x,y,3,0,Math.PI*2);cx.fill();
}
function drwGGBracket(x,y){
  const s=8;
  cx.fillStyle='rgba(184,146,42,0.75)';
  cx.beginPath();cx.moveTo(x,y-s);cx.lineTo(x+s*0.7,y);cx.lineTo(x,y+s);cx.lineTo(x-s*0.7,y);cx.closePath();cx.fill();
  cx.strokeStyle='#7a5e10';cx.lineWidth=1;cx.stroke();
}
function drwFloorBracket(x,y){
  const s=11;
  cx.strokeStyle='#b8922a';cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(x-s,y);cx.lineTo(x,y);cx.lineTo(x,y-s);cx.stroke();
  cx.beginPath();cx.moveTo(x+s,y);cx.lineTo(x,y);cx.stroke();
  cx.fillStyle='#b8922a';cx.beginPath();cx.arc(x,y,3,0,Math.PI*2);cx.fill();
  cx.font='8px Heebo,sans-serif';cx.fillStyle='#b8922a';cx.textAlign='center';
  cx.fillText('רצפה',x,y+13);
}
function drwHole(x,y){
  const r=3.5;
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);
  cx.fillStyle='rgba(184,146,42,0.15)';cx.fill();
  cx.strokeStyle='#b8922a';cx.lineWidth=1.5;cx.stroke();
  cx.beginPath();cx.moveTo(x-r+1,y);cx.lineTo(x+r-1,y);cx.stroke();
  cx.beginPath();cx.moveTo(x,y-r+1);cx.lineTo(x,y+r-1);cx.stroke();
}

// DIM LINE with clickable hit area
function dLine(x1,y1,x2,y2,txt,off,horiz,inputId){
  if(x1===x2&&y1===y2)return;
  cx.save();
  cx.strokeStyle='#b8922a';cx.fillStyle='#b8922a';cx.lineWidth=0.8;cx.setLineDash([3,3]);
  const ox=horiz?0:off, oy=horiz?off:0;
  cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x1+ox,y1+oy);cx.stroke();
  cx.beginPath();cx.moveTo(x2,y2);cx.lineTo(x2+ox,y2+oy);cx.stroke();
  cx.setLineDash([]);
  cx.beginPath();cx.moveTo(x1+ox,y1+oy);cx.lineTo(x2+ox,y2+oy);cx.stroke();
  const ang=Math.atan2(y2+oy-y1-oy,x2+ox-x1-ox),al=7;
  [[x1+ox,y1+oy,ang+Math.PI],[x2+ox,y2+oy,ang]].forEach(([ax,ay,a])=>{
    cx.beginPath();cx.moveTo(ax,ay);
    cx.lineTo(ax+Math.cos(a-0.3)*al,ay+Math.sin(a-0.3)*al);
    cx.lineTo(ax+Math.cos(a+0.3)*al,ay+Math.sin(a+0.3)*al);
    cx.closePath();cx.fill();
  });
  const mx=(x1+ox+x2+ox)/2,my=(y1+oy+y2+oy)/2;
  cx.font='bold 9px Heebo,sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  const tw=cx.measureText(txt).width+8;
  cx.fillStyle=inputId?'rgba(184,146,42,0.2)':'rgba(247,244,239,0.95)';
  cx.fillRect(mx-tw/2,my-7,tw,14);
  cx.fillStyle='#1a1714';cx.fillText(txt,mx,my);
  cx.restore();
  if(inputId) dimHits.push({x:mx-tw/2,y:my-7,w:tw,h:14,id:inputId});
}

function drawTitleBar(cW,cH){
  const ty=cH-28;
  cx.fillStyle='#f7f4ef';cx.fillRect(0,ty,cW,28);
  cx.strokeStyle='rgba(0,0,0,0.07)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,ty);cx.lineTo(cW,ty);cx.stroke();
  cx.font='bold 11px Heebo,sans-serif';cx.fillStyle='#b8922a';cx.textAlign='right';
  cx.fillText('LuzGlass',cW-10,ty+18);
  const sn=document.getElementById('sketchName')?.value||'';
  cx.font='10px Heebo,sans-serif';cx.fillStyle='#8a8278';cx.textAlign='center';
  cx.fillText(sn||new Date().toLocaleDateString('he-IL'),cW/2,ty+18);
  cx.textAlign='left';cx.fillText(new Date().toLocaleDateString('he-IL'),10,ty+18);
}

// CANVAS CLICK → FOCUS INPUT
C.addEventListener('click',function(e){
  const rect=C.getBoundingClientRect();
  const DPR=window.devicePixelRatio||1;
  const ratio=C.width/(rect.width*DPR);
  const cx2=(e.clientX-rect.left)*DPR*ratio;
  const cy2=(e.clientY-rect.top)*DPR*ratio;
  for(const hit of dimHits){
    if(cx2>=hit.x&&cx2<=hit.x+hit.w&&cy2>=hit.y&&cy2<=hit.y+hit.h){
      const el=document.getElementById(hit.id);
      if(el){
        el.scrollIntoView({behavior:'smooth',block:'center'});
        setTimeout(()=>{el.focus();el.select();el.classList.add('hi');},300);
        const tip=document.getElementById('dimTip');
        tip.textContent='✎ לחץ לעריכה';
        tip.style.display='block';
        tip.style.left=(e.clientX-rect.left-30)+'px';
        tip.style.top=(e.clientY-rect.top-28)+'px';
        setTimeout(()=>tip.style.display='none',1400);
      }
      break;
    }
  }
});

// ══════════════ SPECS & ORDER ══════════════
function updateSpecs(){
  const panels=getPanels(),pss=getPStates();
  if(!panels.length){document.getElementById('specs').innerHTML='<strong>פרטי הזמנה</strong>הוסף פריטים';return;}
  const g=GL.find(x=>x.id===selG),f=FN.find(x=>x.id===selF);
  const totalW=panels.reduce((s,_,i)=>s+(pss[i]?.w||50),0);
  const maxH=Math.max(...panels.map((_,i)=>Math.max(pss[i]?.h||200,pss[i]?.slopeH1||0,pss[i]?.slopeH2||0)));
  const area=(totalW*maxH/10000).toFixed(2);
  const total=Math.round(parseFloat(area)*g.price)+(selQ==='zamak'?f.pZ:f.pP);
  const sn=document.getElementById('sketchName')?.value;
  const det=panels.map((p,i)=>`${p.label||p.type}: ${pss[i]?.w||50}×${pss[i]?.h||200}`).join(' | ');
  document.getElementById('specs').innerHTML=`<strong>פרטי הזמנה</strong>
    ${sn?`<span style="color:var(--gold);font-weight:700">${sn}</span><br>`:''}
    ${det}<br>
    זכוכית: ${g.name} 8מ״מ מחוסם · ₪${g.price}/מ״ר<br>
    פרזול: ${f.name} (${selQ==='zamak'?'זאמק':'פליז'})<br>${sand?'+ התזת חול<br>':''}
    שטח: ${area} מ״ר<br>
    <strong style="color:var(--gold)">סה״כ: ₪${total.toLocaleString()}</strong>`;
}

function addToOrder(){
  const panels=getPanels(),pss=getPStates();
  if(!panels.length){showToast('הוסף פריטים תחילה');return;}
  const g=GL.find(x=>x.id===selG),f=FN.find(x=>x.id===selF);
  const totalW=panels.reduce((s,_,i)=>s+(pss[i]?.w||50),0);
  const maxH=Math.max(...panels.map((_,i)=>pss[i]?.h||200));
  const area=(totalW*maxH/10000).toFixed(2);
  const total=Math.round(parseFloat(area)*g.price)+(selQ==='zamak'?f.pZ:f.pP);
  const orders=JSON.parse(localStorage.getItem('lgOrders')||'[]');
  orders.push({
    id:Date.now(),sketchName:document.getElementById('sketchName')?.value||'',orderClient:'',
    type:appMode==='combo'?curCombo.label:'פריט פריט',
    glass:g.name,glassPrice:g.price,finish:f.name,quality:selQ,sand,area,total,
    panels:panels.map((p,i)=>({label:p.label||p.type,type:p.type,w:pss[i]?.w||50,h:pss[i]?.h||200})),
    date:new Date().toLocaleDateString('he-IL'),status:'הזמנה חדשה',
    sketch:C.toDataURL('image/png',0.6)
  });
  localStorage.setItem('lgOrders',JSON.stringify(orders));
  showToast('✓ נוסף להזמנה!');
}
function dlPNG(){const l=document.createElement('a');l.download=`luzglass-${Date.now()}.png`;l.href=C.toDataURL();l.click();}

// ══════════════ SWATCHES ══════════════
function renderSw(){
  document.getElementById('gSw').innerHTML=GL.map(g=>`
    <button class="sw ${g.id===selG?'active':''}" onclick="selG='${g.id}';renderSw();draw()">
      <div class="sw-dot" style="background:${g.dot};${g.b?'border:'+g.b:''}"></div>
      <div class="sw-name">${g.name}</div><div class="sw-price">₪${g.price}</div>
    </button>`).join('');
  document.getElementById('fSw').innerHTML=FN.map(f=>`
    <button class="sw ${f.id===selF?'active':''}" onclick="selF='${f.id}';renderSw();draw()">
      <div class="sw-dot" style="background:${f.dot}"></div><div class="sw-name">${f.name}</div>
    </button>`).join('');
}

// ══════════════ INIT ══════════════
renderCombos(); initPS(); renderPanelCtrl(); renderSw();
window.addEventListener('resize',draw); draw();
