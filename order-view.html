<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuzGlass — הזמנה מלאה</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f4ef;--bg2:#ede9e1;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#1a1714;--muted:#8a8278;--gold:#b8922a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;}

  /* HEADER */
  .header{background:var(--text);padding:28px 20px 20px;color:#f7f4ef;}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;}
  .logo span{color:var(--gold);}
  .order-title{font-size:22px;font-weight:700;margin-bottom:4px;}
  .order-meta{font-size:12px;color:rgba(247,244,239,0.5);line-height:1.7;}
  .header-actions{display:flex;gap:8px;margin-top:16px;}
  .btn-print{padding:10px 20px;background:var(--gold);color:#fff;font-family:Heebo,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;}
  .btn-back{padding:10px 20px;background:transparent;color:rgba(247,244,239,0.6);font-family:Heebo,sans-serif;font-size:13px;border:1px solid rgba(255,255,255,0.15);cursor:pointer;text-decoration:none;display:inline-block;}

  /* SUMMARY TABLE */
  .section{padding:16px 20px;}
  .section-title{font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
  .summary-table{width:100%;border-collapse:collapse;font-size:12px;}
  .summary-table th{padding:8px 10px;background:var(--bg2);font-weight:600;color:var(--muted);text-align:right;font-size:10px;letter-spacing:0.05em;}
  .summary-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top;}
  .summary-table tr:last-child td{border-bottom:none;}
  .item-num{font-size:11px;color:var(--muted);}
  .item-name{font-weight:700;font-size:13px;margin-bottom:2px;}
  .item-details{font-size:11px;color:var(--muted);line-height:1.6;}
  .item-price{font-weight:700;color:var(--gold);font-size:14px;white-space:nowrap;}

  /* TOTAL */
  .total-bar{background:var(--text);color:#f7f4ef;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
  .total-label{font-size:13px;color:rgba(247,244,239,0.6);}
  .total-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;}
  .total-note{font-size:10px;color:rgba(247,244,239,0.3);margin-top:2px;}

  /* SKETCH CARDS */
  .sketches{padding:16px 20px;display:flex;flex-direction:column;gap:16px;}
  .sketch-card{background:var(--surface);border:1px solid var(--border);}
  .sketch-card-header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .sketch-card-num{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:0.15em;}
  .sketch-card-name{font-size:13px;font-weight:700;}
  .sketch-card-type{font-size:11px;color:var(--muted);}
  .sketch-img{width:100%;display:block;}
  .sketch-card-footer{padding:10px 16px;font-size:11px;color:var(--muted);line-height:1.7;border-top:1px solid var(--border);}

  /* EMPTY STATE */
  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:16px;}
  .empty h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}
  .empty p{font-size:14px;line-height:1.6;}
  .btn-go{display:inline-block;margin-top:20px;padding:14px 28px;background:var(--gold);color:#fff;font-family:Heebo,sans-serif;font-size:14px;font-weight:700;text-decoration:none;}

  /* DELETE */
  .btn-del{background:none;border:none;color:rgba(192,57,43,0.5);font-size:13px;cursor:pointer;padding:2px 6px;}
  .btn-del:hover{color:#c0392b;}

  /* PRINT */
  @media print{
    .header-actions,.btn-del,.no-print{display:none!important;}
    .sketch-card{break-inside:avoid;}
    body{background:#fff;}
  }

  .note-box{background:rgba(184,146,42,0.07);border-right:3px solid var(--gold);padding:8px 12px;font-size:12px;color:var(--muted);font-style:italic;margin-top:6px;}
</style>
</head>
<body>

<div id="app"></div>

<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function render(){
  const orderId=getParam('order');
  const all=JSON.parse(localStorage.getItem('lgOrders')||'[]');
  const items=orderId?all.filter(o=>o.orderId===orderId):all;

  if(!items.length){
    document.getElementById('app').innerHTML=`
      <div class="header">
        <div class="header-top">
          <div class="logo">Luz<span>Glass</span></div>
        </div>
      </div>
      <div class="empty">
        <div class="empty-icon">📋</div>
        <h2>אין פריטים בהזמנה</h2>
        <p>עדיין לא הוספת סקיצות להזמנה זו.<br>חזור לסקיצה והוסף מקלחונים.</p>
        <a href="sketch-demo.html" class="btn-go">← חזור לסקיצה</a>
      </div>`;
    return;
  }

  // order info from first item
  const first=items[0];
  const client=first.orderClient||'—';
  const orderNum=first.orderNum||'—';
  const date=first.date||'';
  const grandTotal=items.reduce((s,o)=>s+(o.total||0),0);

  // header
  let html=`
    <div class="header">
      <div class="header-top">
        <div>
          <div class="logo">Luz<span>Glass</span></div>
        </div>
        <div style="text-align:left">
          <div style="font-size:10px;color:rgba(247,244,239,0.4);letter-spacing:0.1em;">תאריך</div>
          <div style="font-size:13px;color:rgba(247,244,239,0.7);">${date}</div>
        </div>
      </div>
      <div class="order-title">${client}</div>
      <div class="order-meta">מספר הזמנה: ${orderNum} &nbsp;·&nbsp; ${items.length} פריטים</div>
      <div class="header-actions no-print">
        <button class="btn-print" onclick="window.print()">🖨️ הדפס</button>
        <a href="sketch-demo.html" class="btn-back">← חזור לסקיצה</a>
      </div>
    </div>`;

  // summary table
  html+=`
    <div class="section">
      <div class="section-title">סיכום הזמנה</div>
      <table class="summary-table">
        <thead>
          <tr>
            <th>#</th>
            <th>פריט</th>
            <th>מידות / פאנלים</th>
            <th>זכוכית</th>
            <th>פרזול</th>
            <th>שטח</th>
            <th>מחיר</th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody>`;

  items.forEach((item,i)=>{
    const panelStr=item.panels?item.panels.map(p=>`${p.label} ${p.wT}×${p.h}`).join(' | '):'—';
    html+=`
      <tr>
        <td><span class="item-num">${i+1}</span></td>
        <td>
          <div class="item-name">${item.sketchName||item.type}</div>
          <div class="item-details">${item.cat||''} — ${item.type}</div>
        </td>
        <td><div class="item-details">${panelStr}</div></td>
        <td><div class="item-details">${item.glass||'—'}<br>₪${item.glassPrice||0}/מ"ר</div></td>
        <td><div class="item-details">${item.finish||'—'}<br>${item.quality==='pliz'?'פליז':'זאמק'}${item.sand?' · חול':''}</div></td>
        <td><div class="item-details">${item.area||0} מ"ר</div></td>
        <td><span class="item-price">₪${(item.total||0).toLocaleString()}</span></td>
        <td class="no-print"><button class="btn-del" onclick="deleteItem(${item.id})">✕</button></td>
      </tr>`;
    if(item.notes){
      html+=`<tr><td colspan="8"><div class="note-box">📝 ${item.notes}</div></td></tr>`;
    }
  });

  html+=`</tbody></table></div>`;

  // total
  html+=`
    <div class="total-bar">
      <div>
        <div class="total-label">סה"כ הזמנה (ללא מע"מ)</div>
        <div class="total-note">* לא כולל התקנה · מחיר משוער</div>
      </div>
      <div style="text-align:left">
        <div class="total-val">₪${grandTotal.toLocaleString()}</div>
      </div>
    </div>`;

  // sketch cards
  html+=`<div class="sketches"><div class="section-title" style="padding:16px 20px 0">סקיצות</div>`;
  items.forEach((item,i)=>{
    html+=`
      <div class="sketch-card">
        <div class="sketch-card-header">
          <div>
            <div class="sketch-card-num">פריט ${i+1}</div>
            <div class="sketch-card-name">${item.sketchName||item.type}</div>
            <div class="sketch-card-type">${item.cat} — ${item.type}</div>
          </div>
          <span class="item-price">₪${(item.total||0).toLocaleString()}</span>
        </div>
        ${item.sketch?`<img class="sketch-img" src="${item.sketch}" alt="סקיצה ${i+1}">`:''}
        <div class="sketch-card-footer">
          ${item.panels?item.panels.map(p=>`${p.label}: ${p.wT}×${p.h} ס"מ`).join(' &nbsp;·&nbsp; '):''}
          <br>זכוכית: ${item.glass} &nbsp;·&nbsp; פרזול: ${item.finish} (${item.quality==='pliz'?'פליז':'זאמק'})
          ${item.sand?' &nbsp;·&nbsp; התזת חול':''}
          ${item.notes?`<div class="note-box" style="margin-top:8px">📝 ${item.notes}</div>`:''}
        </div>
      </div>`;
  });
  html+=`</div>`;

  // footer
  html+=`
    <div style="padding:24px 20px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid var(--border);">
      <strong style="color:var(--gold)">LuzGlass</strong> &nbsp;·&nbsp; מפעל עיבוד זכוכית &nbsp;·&nbsp; הופק: ${new Date().toLocaleDateString('he-IL')}
    </div>`;

  document.getElementById('app').innerHTML=html;
}

function deleteItem(id){
  if(!confirm('למחוק פריט זה מההזמנה?')) return;
  const all=JSON.parse(localStorage.getItem('lgOrders')||'[]');
  localStorage.setItem('lgOrders',JSON.stringify(all.filter(o=>o.id!==id)));
  render();
}

render();
</script>
</body>
</html>
