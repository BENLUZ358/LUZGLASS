<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LuzGlass — תחנת בדיקה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a1a1a;--surface:#242424;--surface2:#2e2e2e;--border:rgba(255,255,255,0.08);--text:#f0ede8;--muted:#888;--gold:#c9a84c;--green:#27ae60;--red:#c0392b;--blue:#2980b9;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;height:100%;overflow:hidden;}

  /* LAYOUT */
  .app{display:grid;grid-template-rows:56px 1fr;height:100vh;}

  /* TOP BAR */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:14px;z-index:10;}
  .tb-logo{font-size:16px;font-weight:900;color:var(--text);}.tb-logo span{color:var(--gold);}
  .tb-title{font-size:15px;font-weight:700;flex:1;}
  .tb-progress{display:flex;align-items:center;gap:10px;}
  .prog-text{font-size:13px;font-weight:700;color:var(--gold);}
  .prog-bar{width:120px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s;}
  .tb-btn{padding:8px 16px;font-family:Heebo,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;border-radius:4px;transition:all 0.15s;}
  .tb-btn-gold{background:var(--gold);color:#1a1a1a;}
  .tb-btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .tb-btn-green{background:var(--green);color:#fff;}

  /* MAIN */
  .main{display:grid;grid-template-columns:280px 1fr;overflow:hidden;}

  /* ORDER LIST */
  .order-list{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
  .ol-header{padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
  .ol-header-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;}
  .ol-filter{display:flex;flex-direction:column;gap:6px;}
  .ol-search{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);font-family:Heebo,sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;border-radius:3px;}
  .ol-search::placeholder{color:var(--muted);}
  .ol-select{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);font-family:Heebo,sans-serif;font-size:12px;color:var(--text);outline:none;width:100%;border-radius:3px;cursor:pointer;-webkit-appearance:none;}

  .order-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative;}
  .order-item:hover{background:var(--surface2);}
  .order-item.active{background:rgba(201,168,76,0.1);border-right:3px solid var(--gold);}
  .oi-client{font-size:14px;font-weight:700;margin-bottom:3px;}
  .oi-desc{font-size:11px;color:var(--muted);margin-bottom:5px;}
  .oi-progress{display:flex;align-items:center;gap:7px;}
  .oi-prog-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
  .oi-prog-fill{height:100%;border-radius:2px;transition:width 0.3s;}
  .oi-prog-text{font-size:10px;font-weight:700;white-space:nowrap;}
  .oi-done-badge{position:absolute;top:10px;left:12px;width:20px;height:20px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

  /* CHECK AREA */
  .check-area{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative;}

  /* EMPTY STATE */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px;}
  .empty-state .ei{font-size:48px;}
  .empty-state p{font-size:15px;}

  /* SKETCH VIEWER */
  .sketch-viewer{flex:1;position:relative;overflow:hidden;touch-action:none;}
  .sketch-img{position:absolute;transform-origin:0 0;touch-action:none;user-select:none;}
  .sketch-img img{display:block;max-width:none;}

  /* OVERLAY CANVAS for drawing */
  .draw-canvas{position:absolute;top:0;left:0;touch-action:none;pointer-events:none;}
  .draw-mode .draw-canvas{pointer-events:all;}
  .draw-mode .sketch-img{pointer-events:none;}

  /* PANEL BUTTONS (tap zones) */
  .panel-btn{
    position:absolute;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:900;
    cursor:pointer;
    transition:all 0.2s;
    border:3px solid rgba(255,255,255,0.3);
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    -webkit-tap-highlight-color:transparent;
    z-index:5;
  }
  .panel-btn.unchecked{background:rgba(30,30,30,0.85);color:rgba(255,255,255,0.5);}
  .panel-btn.unchecked:active{transform:scale(0.9);}
  .panel-btn.checked{background:var(--green);color:#fff;border-color:var(--green);animation:checkPop 0.3s ease;}
  @keyframes checkPop{0%{transform:scale(0.8)}60%{transform:scale(1.15)}100%{transform:scale(1)}}

  /* BOTTOM TOOLBAR */
  .bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;}
  .tool-btn{padding:9px 16px;border-radius:6px;font-family:Heebo,sans-serif;font-size:13px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
  .tool-btn.active{background:var(--gold);color:#1a1a1a;}
  .tool-btn:not(.active){background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .zoom-controls{display:flex;gap:4px;}
  .zoom-btn{width:36px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .spacer{flex:1;}
  .item-count{font-size:13px;color:var(--muted);}
  .item-count strong{color:var(--gold);}

  /* COMPLETE BANNER */
  .complete-banner{
    position:absolute;inset:0;
    background:rgba(39,174,96,0.95);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    z-index:20;animation:fadeIn 0.4s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .complete-banner .cb-icon{font-size:64px;}
  .complete-banner h2{font-size:28px;font-weight:900;color:#fff;}
  .complete-banner p{font-size:16px;color:rgba(255,255,255,0.8);}
  .complete-banner .cb-btn{padding:14px 32px;background:#fff;color:var(--green);font-family:Heebo,sans-serif;font-size:16px;font-weight:900;border:none;cursor:pointer;border-radius:6px;margin-top:8px;}

  /* SKETCH PLACEHOLDER */
  .sketch-placeholder{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;gap:20px;
  }
  .sketch-placeholder .sp-icon{font-size:48px;opacity:0.3;}

  /* ITEMS PANEL (bottom sheet) */
  .items-sheet{
    position:absolute;bottom:0;right:0;left:0;
    background:var(--surface);border-top:1px solid var(--border);
    max-height:45%;overflow-y:auto;
    transform:translateY(100%);transition:transform 0.3s;
    z-index:10;
  }
  .items-sheet.open{transform:translateY(0);}
  .is-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);}
  .is-title{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;}
  .is-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
  .is-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s;}
  .is-item:hover{background:var(--surface2);}
  .is-item.checked{background:rgba(39,174,96,0.1);}
  .is-check{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all 0.2s;}
  .is-item.checked .is-check{background:var(--green);border-color:var(--green);color:#fff;}
  .is-glass{font-size:14px;font-weight:700;flex:1;}
  .is-dims{font-size:12px;color:var(--muted);}
  .is-proc{font-size:10px;padding:2px 7px;border-radius:2px;font-weight:700;}
  .is-proc-cut{background:rgba(41,128,185,0.15);color:var(--blue);}
  .is-proc-chis{background:rgba(142,68,173,0.15);color:#8e44ad;}

  @media(max-width:900px){
    .desktop-only{display:none !important;}
    #pickOrderBtn{display:flex !important;}

    .main{grid-template-columns:1fr;}
    .order-list{display:none;}
  }
  @media(min-width:901px){
    .mobile-picker{display:none !important;}
  }
  .mobile-picker{
    display:none;
    position:fixed;inset:0;z-index:50;
    background:var(--bg);flex-direction:column;
  }
  .mp-header{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .mp-title{font-size:16px;font-weight:700;flex:1;}
  .mp-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
  .mp-search{padding:12px 16px;border-bottom:1px solid var(--border);}
  .mp-search input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);font-family:Heebo,sans-serif;font-size:15px;color:var(--text);outline:none;border-radius:6px;}
  .mp-search input::placeholder{color:var(--muted);}
  .mp-list{flex:1;overflow-y:auto;}
  .mp-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;}
  .mp-item:active{background:rgba(201,168,76,0.1);}
  .mp-item-info{flex:1;}
  .mp-client{font-size:15px;font-weight:700;}
  .mp-desc{font-size:12px;color:var(--muted);margin-top:2px;}
  .mp-prog{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .mp-prog-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
  .mp-prog-fill{height:100%;border-radius:2px;}
  .mp-prog-txt{font-size:11px;font-weight:700;white-space:nowrap;}
  .mp-done{width:28px;height:28px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-logo">Luz<span>Glass</span></div>
    <div class="tb-title" id="tbTitle">תחנת בדיקה</div>
    <!-- desktop search -->
    <div style="flex:1;position:relative;max-width:280px" class="desktop-only">
      <input type="text" id="quickSearch" placeholder="🔍 חפש לקוח / הזמנה..." oninput="quickJump(this.value)"
        style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.08);border:1px solid var(--border);font-family:Heebo,sans-serif;font-size:13px;color:var(--text);outline:none;border-radius:4px;">
      <div id="quickResults" style="display:none;position:absolute;top:100%;right:0;left:0;background:#2e2e2e;border:1px solid var(--border);border-radius:4px;z-index:50;max-height:200px;overflow-y:auto;margin-top:2px;"></div>
    </div>
    <!-- mobile: pick order button -->
    <button class="tb-btn tb-btn-gold" id="pickOrderBtn" onclick="openMobilePicker()" style="display:none">📋 בחר הזמנה</button>
    <div class="tb-progress" id="tbProgress" style="display:none">
      <span class="prog-text" id="progText">0/0</span>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <button class="tb-btn tb-btn-outline" onclick="toggleItems()">📋 פריטים</button>
    <button class="tb-btn tb-btn-outline" onclick="resetCurrent()">↺ אפס</button>
    <a href="workday.html" class="tb-btn tb-btn-outline" style="text-decoration:none">← חזור</a>
  </div>

  <div class="main">

    <!-- ORDER LIST -->
    <div class="order-list">
      <div class="ol-header">
        <div class="ol-header-title">הזמנות לבדיקה</div>
        <div class="ol-filter">
          <input type="text" class="ol-search" id="olSearch" placeholder="🔍 חיפוש לקוח..." oninput="renderOrderList()">
          <select class="ol-select" id="olGlass" onchange="renderOrderList()">
            <option value="">כל הזכוכיות</option>
            <option value='8מ"מ שקוף'>8מ"מ שקוף</option>
            <option value='8מ"מ קליר'>8מ"מ קליר</option>
            <option value='8מ"מ אפור'>8מ"מ אפור</option>
            <option value='8מ"מ אסיד'>8מ"מ אסיד</option>
            <option value='8מ"מ גרניט'>8מ"מ גרניט</option>
            <option value='8מ"מ גלינה קליר'>8מ"מ גלינה קליר</option>
            <option value='10מ"מ קליר'>10מ"מ קליר</option>
            <option value='6מ"מ שקוף'>6מ"מ שקוף</option>
          </select>
        </div>
      </div>
      <div id="orderListBody"></div>
    </div>

    <!-- CHECK AREA -->
    <div class="check-area" id="checkArea">

      <!-- EMPTY -->
      <div class="empty-state" id="emptyState">
        <div class="ei">🔍</div>
        <p>בחר הזמנה מהרשימה לבדיקה</p>
      </div>

      <!-- SKETCH VIEWER -->
      <div class="sketch-viewer" id="sketchViewer" style="display:none">
        <div class="sketch-img" id="sketchImg">
          <!-- sketch image or SVG here -->
        </div>
        <canvas class="draw-canvas" id="drawCanvas"></canvas>
        <!-- panel buttons rendered by JS -->
      </div>

      <!-- SKETCH PLACEHOLDER (no image) -->
      <div class="sketch-placeholder" id="sketchPlaceholder" style="display:none">
        <div class="sp-icon">📐</div>
        <div style="font-size:15px;color:var(--muted)">אין סקיצה — בדוק פריטים ברשימה</div>
        <button class="tb-btn tb-btn-gold" onclick="openItems()">פתח רשימת פריטים</button>
      </div>

      <!-- COMPLETE BANNER -->
      <div class="complete-banner" id="completeBanner" style="display:none">
        <div class="cb-icon">✅</div>
        <h2>כל הפריטים נבדקו!</h2>
        <p id="completeName"></p>
        <button class="cb-btn" onclick="hideComplete()">המשך לבדיקה הבאה →</button>
      </div>

      <!-- BOTTOM BAR -->
      <div class="bottom-bar" id="bottomBar" style="display:none">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="zoom(-0.2)">−</button>
          <button class="zoom-btn" onclick="zoom(+0.2)">+</button>
          <button class="zoom-btn" onclick="resetZoom()" title="אפס זום" style="font-size:12px">↺</button>
        </div>
        <button class="tool-btn active" id="toolCheck" onclick="setTool('check')">✓ סמן בדוק</button>
        <button class="tool-btn" id="toolDraw" onclick="setTool('draw')">✏️ ציור</button>
        <button class="tool-btn" id="toolClear" onclick="clearDrawing()" style="display:none">🗑 נקה</button>
        <div class="spacer"></div>
        <div class="item-count" id="itemCount"></div>
        <button class="tb-btn tb-btn-green" id="completeBtn" onclick="completeOrder()" style="display:none">✓ הושלם</button>
      </div>

    </div><!-- /check-area -->
  </div><!-- /main -->
</div><!-- /app -->

<!-- ITEMS SHEET -->
<div class="items-sheet" id="itemsSheet">
  <div class="is-header">
    <span class="is-title" id="isTitle">פריטים</span>
    <button class="is-close" onclick="closeItems()">✕</button>
  </div>
  <div id="isBody"></div>
</div>

<!-- MOBILE PICKER -->
<div class="mobile-picker" id="mobilePicker">
  <div class="mp-header">
    <div class="mp-title">בחר הזמנה לבדיקה</div>
    <button class="mp-close" onclick="closeMobilePicker()">✕</button>
  </div>
  <div class="mp-search">
    <input type="text" id="mpSearch" placeholder="🔍 חפש לקוח / מספר הזמנה..." oninput="renderMobilePicker()">
  </div>
  <div class="mp-list" id="mpList"></div>
</div>

<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
let orders = [];
let checkState = {}; // {orderId: {itemIdx: true/false}}
let currentOrder = null;
let currentTool = 'check';
let scale = 1, panX = 0, panY = 0;
let isPinching = false, lastPinchDist = 0;
let isPanning = false, lastPanX = 0, lastPanY = 0;
let isDrawing = false, drawCtx = null;
let lastDrawX = 0, lastDrawY = 0;

function openMobilePicker(){
  document.getElementById('mobilePicker').style.display='flex';
  document.getElementById('mpSearch').value='';
  renderMobilePicker();
  setTimeout(()=>document.getElementById('mpSearch').focus(),100);
}

function closeMobilePicker(){
  document.getElementById('mobilePicker').style.display='none';
}

function renderMobilePicker(){
  const q = (document.getElementById('mpSearch').value||'').toLowerCase();
  const list = document.getElementById('mpList');
  const filtered = orders.filter(o=>
    !q ||
    (o.orderClient||'').toLowerCase().includes(q) ||
    (o.orderNum||'').toLowerCase().includes(q) ||
    (o.sketchName||'').toLowerCase().includes(q) ||
    (o.glassFullName||o.glass||'').toLowerCase().includes(q)
  );
  if(!filtered.length){
    list.innerHTML='<div style="padding:32px;text-align:center;color:var(--muted)">אין תוצאות</div>';
    return;
  }
  list.innerHTML = filtered.map(o=>{
    const items = o.items||[];
    const total = items.length||1;
    const checked = items.filter((_,i)=>checkState[o.id]?.[i]).length;
    const pct = total ? Math.round(checked/total*100) : 0;
    const done = pct===100 && items.length>0;
    return `
      <div class="mp-item" onclick="selectOrder(${o.id});closeMobilePicker()">
        <div class="mp-item-info">
          <div class="mp-client">${o.orderClient}</div>
          <div class="mp-desc">${o.orderNum||''} · ${o.glassFullName||o.glass||''} · ${o.sketchName||''}</div>
          <div class="mp-prog">
            <div class="mp-prog-bar"><div class="mp-prog-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--gold)'}"></div></div>
            <span class="mp-prog-txt" style="color:${done?'var(--green)':'var(--muted)'}">${checked}/${total}</span>
          </div>
        </div>
        ${done?'<div class="mp-done">✓</div>':''}
      </div>`;
  }).join('');
}

function quickJump(q){
  const el = document.getElementById('quickResults');
  if(!q.trim()){ el.style.display='none'; return; }
  const ql = q.toLowerCase();
  const results = orders.filter(o=>
    (o.orderClient||'').toLowerCase().includes(ql) ||
    (o.orderNum||'').toLowerCase().includes(ql) ||
    (o.sketchName||'').toLowerCase().includes(ql)
  ).slice(0,6);

  if(!results.length){ el.style.display='none'; return; }

  el.style.display='block';
  el.innerHTML = results.map(o=>{
    const items = o.items||[];
    const checked = items.filter((_,i)=>checkState[o.id]?.[i]).length;
    const pct = items.length ? Math.round(checked/items.length*100) : 0;
    return `
      <div onclick="selectOrder(${o.id});document.getElementById('quickSearch').value='';document.getElementById('quickResults').style.display='none'"
        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06);transition:background 0.15s"
        onmouseover="this.style.background='rgba(201,168,76,0.1)'" onmouseout="this.style.background=''">
        <div style="font-size:14px;font-weight:700">${o.orderClient}</div>
        <div style="font-size:11px;color:var(--muted)">${o.orderNum||''} · ${o.glassFullName||o.glass||''} · ${o.sketchName||''}</div>
        <div style="font-size:10px;color:${pct===100?'var(--green)':'var(--gold)'};margin-top:3px">${checked}/${items.length} נבדקו${pct===100?' ✓':''}</div>
      </div>`;
  }).join('');
}

// Close results when clicking outside
document.addEventListener('click', e=>{
  if(!e.target.closest('#quickSearch')&&!e.target.closest('#quickResults'))
    document.getElementById('quickResults').style.display='none';
});

function loadOrders(){
  const saved = JSON.parse(localStorage.getItem('lgOrders')||'[]');
  // load check state
  checkState = JSON.parse(localStorage.getItem('lgCheckState')||'{}');
  // filter: in work or sent to chisum (ready for checking)
  const wd = JSON.parse(localStorage.getItem('lgWorkDay')||'{}');
  const inWork = wd.inWork || [];
  const inChisum = wd.inChisum || [];
  const checkable = [...inWork, ...inChisum];

  orders = saved.filter(o => checkable.includes(o.id) || o.status === 'ירד לביצוע' || o.status === 'נשלח לחיסום');

  // inject demo if empty
  if(!orders.length) orders = demoOrders();
}

function demoOrders(){
  return [
    // ── 2026-001 · בן-דוד · חדר רחצה ראשי ──
    {id:2001, orderClient:'בן-דוד', orderNum:'2026-001',
     sketchName:'חדר רחצה ראשי', glass:'שקוף', glassFullName:'8מ"מ שקוף',

function saveCheckState(){

// ═══════════════════════════════════════
//  ORDER LIST
// ═══════════════════════════════════════
function renderOrderList(){
  const search = document.getElementById('olSearch').value.toLowerCase();
  const glass  = document.getElementById('olGlass').value;
  const el = document.getElementById('orderListBody');

  const filtered = orders.filter(o=>{
    if(search && !(o.orderClient||'').toLowerCase().includes(search)) return false;
    if(glass && (o.glassFullName||o.glass||'') !== glass &&
       !(o.items||[]).some(i=>(i.glassFullName||i.name||'').includes(glass))) return false;
    return true;
  });

  el.innerHTML = filtered.map(o=>{
    const items = o.items || [];
    const total = items.length || 1;
    const checked = items.length
      ? items.filter((_,i)=> checkState[o.id]?.[i]).length
      : (checkState[o.id]?.done ? 1 : 0);
    const pct = total ? Math.round(checked/total*100) : 0;
    const done = pct === 100;
    const isActive = currentOrder?.id === o.id;

    return `
      <div class="order-item ${isActive?'active':''}" onclick="selectOrder(${o.id})">
        ${done?'<div class="oi-done-badge">✓</div>':''}
        <div class="oi-client">${o.orderClient}</div>
        <div class="oi-desc">${o.sketchName||''} · ${o.glassFullName||o.glass||''}</div>
        <div class="oi-progress">
          <div class="oi-prog-bar">
            <div class="oi-prog-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--gold)'}"></div>
          </div>
          <span class="oi-prog-text" style="color:${done?'var(--green)':'var(--muted)'}">${checked}/${total}</span>
        </div>
      </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">אין הזמנות</div>';
}

// ═══════════════════════════════════════
//  SELECT ORDER
// ═══════════════════════════════════════
function selectOrder(id){
  currentOrder = orders.find(o=>o.id===id);
  if(!currentOrder) return;
  if(!checkState[id]) checkState[id] = {};

  document.getElementById('emptyState').style.display='none';
  document.getElementById('completeBanner').style.display='none';
  document.getElementById('bottomBar').style.display='flex';
  document.getElementById('tbTitle').textContent = currentOrder.orderClient + ' — ' + (currentOrder.sketchName||'');
  // show pick button on mobile
  if(window.innerWidth<=900) document.getElementById('pickOrderBtn').style.display='flex';
  document.getElementById('tbProgress').style.display='flex';

  // show sketch or placeholder
  if(currentOrder.sketch){
    showSketch(currentOrder.sketch);
  } else {
    // generate SVG sketch from items
    showGeneratedSketch(currentOrder);
  }

  renderOrderList();
  updateProgress();
  closeItems();
}

// ═══════════════════════════════════════
//  GENERATED SKETCH (when no image)
// ═══════════════════════════════════════
function showGeneratedSketch(o){
  // Show viewer, hide others
  document.getElementById('emptyState').style.display='none';
  document.getElementById('sketchPlaceholder').style.display='none';
  document.getElementById('sketchViewer').style.display='block';
  document.getElementById('bottomBar').style.display='flex';

  const items = o.items || [];
  if(!items.length){
    document.getElementById('sketchImg').innerHTML =
      '<div style="color:var(--muted);text-align:center;padding:40px;font-size:14px">אין פריטים — לחץ על "פריטים" להוספה</div>';
    return;
  }

  const viewer = document.getElementById('sketchViewer');
  const vW = viewer.clientWidth  || window.innerWidth;
  const vH = viewer.clientHeight || (window.innerHeight - 120);

  // Calculate grid
  const cols = Math.min(items.length, items.length <= 2 ? 2 : 3);
  const rows = Math.ceil(items.length / cols);
  const pad = 50;
  const cellW = Math.floor((vW - pad*2) / cols);
  const cellH = Math.floor((vH - pad*2 - 40) / rows); // 40 for header
  const W = vW, H = rows * cellH + pad*2 + 40;

  let panelsHTML = '';
  items.forEach((item, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = pad + col * cellW + 8;
    const y = 50 + pad/2 + row * cellH + 8;
    const w = cellW - 16;
    const h = cellH - 16;
    const isChisum  = item.chisum;
    const isChecked = !!(checkState[o.id] && checkState[o.id][i]);
    const fill   = isChecked ? 'rgba(39,174,96,0.3)'   : isChisum ? 'rgba(142,68,173,0.12)' : 'rgba(41,128,185,0.12)';
    const stroke = isChecked ? '#27ae60' : isChisum ? '#8e44ad' : '#2980b9';
    const label  = item.name || item.glassFullName || '';
    const dims   = (item.w && item.h) ? item.w + '×' + item.h + ' ס"מ' : '';
    const proc   = isChisum ? 'מחוסם' : 'מלוטש';
    const procColor = isChisum ? '#8e44ad' : '#2980b9';
    const midX = x + w/2;
    const midY = y + h/2;

    panelsHTML += '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="2.5" rx="3" onclick="checkItem('+i+')" style="cursor:pointer"/>';
    if(isChecked){
      panelsHTML += '<text x="'+midX+'" y="'+(midY-14)+'" text-anchor="middle" font-family="Heebo" font-size="28" fill="#27ae60">✓</text>';
    }
    panelsHTML += '<text x="'+midX+'" y="'+(midY+(isChecked?14:0))+'" text-anchor="middle" font-family="Heebo,sans-serif" font-size="13" font-weight="700" fill="'+(isChecked?'#27ae60':'#f0ede8')+'">'+label+'</text>';
    if(dims) panelsHTML += '<text x="'+midX+'" y="'+(midY+(isChecked?14:0)+17)+'" text-anchor="middle" font-family="Heebo,sans-serif" font-size="11" fill="rgba(240,237,232,0.5)">'+dims+'</text>';
    panelsHTML += '<text x="'+midX+'" y="'+(y+h-10)+'" text-anchor="middle" font-family="Heebo,sans-serif" font-size="10" font-weight="700" fill="'+procColor+'">'+proc+'</text>';
    // corner marks
    panelsHTML += '<path d="M'+(x+8)+','+y+' L'+x+','+y+' L'+x+','+(y+8)+'" fill="none" stroke="'+stroke+'" stroke-width="1.5"/>';
    panelsHTML += '<path d="M'+(x+w-8)+','+y+' L'+(x+w)+','+y+' L'+(x+w)+','+(y+8)+'" fill="none" stroke="'+stroke+'" stroke-width="1.5"/>';
    panelsHTML += '<path d="M'+x+','+(y+h-8)+' L'+x+','+(y+h)+' L'+(x+8)+','+(y+h)+'" fill="none" stroke="'+stroke+'" stroke-width="1.5"/>';
    panelsHTML += '<path d="M'+(x+w)+','+(y+h-8)+' L'+(x+w)+','+(y+h)+' L'+(x+w-8)+','+(y+h)+'" fill="none" stroke="'+stroke+'" stroke-width="1.5"/>';
    // dim labels
    if(item.w) panelsHTML += '<text x="'+midX+'" y="'+(y-6)+'" text-anchor="middle" font-family="Heebo" font-size="9" fill="rgba(201,168,76,0.7)">'+item.w+' ס"מ</text>';
    if(item.h) panelsHTML += '<text x="'+(x-6)+'" y="'+midY+'" text-anchor="middle" font-family="Heebo" font-size="9" fill="rgba(201,168,76,0.7)" transform="rotate(-90,'+(x-6)+','+midY+')">'+item.h+' ס"מ</text>';
  });

  const headerTxt = (o.orderClient||'') + ' · ' + (o.orderNum||'') + ' · ' + (o.glassFullName||o.glass||'');
  const svg = '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'"'
    +' xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;display:block">'
    +'<rect x="0" y="0" width="'+W+'" height="44" fill="rgba(0,0,0,0.5)"/>'
    +'<text x="'+W/2+'" y="28" text-anchor="middle" font-family="Heebo,sans-serif" font-size="13" font-weight="700" fill="rgba(201,168,76,0.9)">'+headerTxt+'</text>'
    + panelsHTML
    +'</svg>';

  document.getElementById('sketchImg').innerHTML = svg;
  scale=1; panX=0; panY=0;
  applyTransform();
  setupCanvas();
}

function showSketch(src){
  document.getElementById('sketchPlaceholder').style.display='none';
  document.getElementById('sketchViewer').style.display='block';
  scale=1; panX=0; panY=0;
  document.getElementById('sketchImg').innerHTML = `<img src="${src}" style="max-width:100%;max-height:100%">`;
  applyTransform();
  setupCanvas();
  setupGestures();
}

// ═══════════════════════════════════════
//  CHECK ITEM
// ═══════════════════════════════════════
function checkItem(idx){
  if(!currentOrder) return;
  const id = currentOrder.id;
  if(!checkState[id]) checkState[id] = {};
  checkState[id][idx] = !checkState[id][idx];
  saveCheckState();
  showGeneratedSketch(currentOrder);
  updateProgress();
  renderOrderList();
  // check if all done
  const items = currentOrder.items || [];
  const allDone = items.every((_,i) => checkState[id]?.[i]);
  if(allDone && items.length > 0) showComplete();
}

function updateProgress(){
  if(!currentOrder) return;
  const items = currentOrder.items || [];
  const total = items.length;
  const checked = items.filter((_,i)=> checkState[currentOrder.id]?.[i]).length;
  const pct = total ? Math.round(checked/total*100) : 0;
  document.getElementById('progText').textContent = `${checked}/${total}`;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progFill').style.background = pct===100?'var(--green)':'var(--gold)';

  const countEl = document.getElementById('itemCount');
  countEl.innerHTML = `בדקתי <strong>${checked}</strong> מתוך <strong>${total}</strong>`;

  const completeBtn = document.getElementById('completeBtn');
  completeBtn.style.display = pct===100 ? 'block':'none';
}

function showComplete(){
  document.getElementById('completeBanner').style.display='flex';
  document.getElementById('completeName').textContent =
    currentOrder.orderClient + ' — כל הפריטים אושרו ✓';
}

function hideComplete(){
  document.getElementById('completeBanner').style.display='none';
}

function completeOrder(){
  showComplete();
}

// ═══════════════════════════════════════
//  ITEMS SHEET
// ═══════════════════════════════════════
function toggleItems(){ document.getElementById('itemsSheet').classList.toggle('open'); renderItems(); }
function openItems(){ document.getElementById('itemsSheet').classList.add('open'); renderItems(); }
function closeItems(){ document.getElementById('itemsSheet').classList.remove('open'); }

function renderItems(){
  if(!currentOrder){ document.getElementById('isBody').innerHTML='<div style="padding:20px;color:var(--muted)">בחר הזמנה</div>'; return; }
  const items = currentOrder.items || [];
  document.getElementById('isTitle').textContent = currentOrder.orderClient + ' — ' + items.length + ' פריטים';
  document.getElementById('isBody').innerHTML = items.map((item,i)=>{
    const isChecked = checkState[currentOrder.id]?.[i];
    return `
      <div class="is-item ${isChecked?'checked':''}" onclick="checkItem(${i})">
        <div class="is-check">${isChecked?'✓':''}</div>
        <div style="flex:1">
          <div class="is-glass">${item.name||item.glassFullName||'—'}</div>
          <div class="is-dims">${item.w||''}${item.w?'×':''}${item.h||''} ס"מ</div>
        </div>
        <div class="is-proc ${item.chisum?'is-proc-chis':'is-proc-cut'}">${item.chisum?'מחוסם 🔥':'מלוטש ✂️'}</div>
      </div>`;
  }).join('') || '<div style="padding:20px;color:var(--muted);font-size:13px">אין פריטים מוזנים</div>';
}

// ═══════════════════════════════════════
//  TOOLS
// ═══════════════════════════════════════
function setTool(t){
  currentTool = t;
  document.getElementById('toolCheck').classList.toggle('active', t==='check');
  document.getElementById('toolDraw').classList.toggle('active', t==='draw');
  const viewer = document.getElementById('sketchViewer');
  viewer.classList.toggle('draw-mode', t==='draw');
  const canvas = document.getElementById('drawCanvas');
  canvas.style.cursor = t==='draw' ? 'crosshair' : 'default';
  document.getElementById('toolClear').style.display = t==='draw' ? 'flex' : 'none';
}

function clearDrawing(){
  if(!drawCtx) return;
  const canvas = document.getElementById('drawCanvas');
  drawCtx.clearRect(0, 0, canvas.width, canvas.height);
}

// ═══════════════════════════════════════
//  ZOOM / PAN
// ═══════════════════════════════════════
function applyTransform(){
  document.getElementById('sketchImg').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}
function zoom(delta){
  scale = Math.max(0.3, Math.min(4, scale+delta));
  applyTransform();
}
function resetZoom(){ scale=1; panX=0; panY=0; applyTransform(); }

function setupCanvas(){
  const viewer = document.getElementById('sketchViewer');
  const canvas = document.getElementById('drawCanvas');
  const DPR = window.devicePixelRatio || 1;
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  canvas.width  = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  drawCtx = canvas.getContext('2d');
  drawCtx.scale(DPR, DPR);
  drawCtx.strokeStyle = '#f5c518';
  drawCtx.lineWidth   = 4;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';
}

let gesturesSetup = false;
function setupGestures(){
  if(gesturesSetup) return;
  gesturesSetup = true;
  const viewer = document.getElementById('sketchViewer');
  viewer.addEventListener('touchstart', onTouchStart, {passive:false});
  viewer.addEventListener('touchmove', onTouchMove, {passive:false});
  viewer.addEventListener('touchend', onTouchEnd, {passive:false});
}

function getDist(t1,t2){
  return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY);
}

function onTouchStart(e){
  e.preventDefault();
  if(e.touches.length===2){
    isPinching=true;
    lastPinchDist=getDist(e.touches[0],e.touches[1]);
  } else if(e.touches.length===1){
    const t=e.touches[0];
    if(currentTool==='draw'){
      isDrawing=true;
      const canvas=document.getElementById('drawCanvas');
      const rect=canvas.getBoundingClientRect();
      const x=t.clientX-rect.left;
      const y=t.clientY-rect.top;
      lastDrawX=x; lastDrawY=y;
      drawCtx.beginPath();
      drawCtx.moveTo(x, y);
    } else {
      isPanning=true;
      lastPanX=t.clientX; lastPanY=t.clientY;
    }
  }
}

function onTouchMove(e){
  e.preventDefault();
  if(isPinching && e.touches.length===2){
    const dist=getDist(e.touches[0],e.touches[1]);
    const delta=(dist-lastPinchDist)*0.005;
    scale=Math.max(0.3,Math.min(4,scale+delta));
    lastPinchDist=dist;
    applyTransform();
  } else if(isPanning && e.touches.length===1){
    const t=e.touches[0];
    panX+=(t.clientX-lastPanX); panY+=(t.clientY-lastPanY);
    lastPanX=t.clientX; lastPanY=t.clientY;
    applyTransform();
  } else if(isDrawing && e.touches.length===1){
    const t=e.touches[0];
    const canvas=document.getElementById('drawCanvas');
    const rect=canvas.getBoundingClientRect();
    const x=t.clientX-rect.left;
    const y=t.clientY-rect.top;
    drawCtx.lineTo(x, y);
    drawCtx.stroke();
    lastDrawX=x; lastDrawY=y;
  }
}

function onTouchEnd(e){
  isPinching=false; isPanning=false; isDrawing=false;
}

function resetCurrent(){
  if(!currentOrder) return;
  if(!confirm('לאפס את הבדיקה של הזמנה זו?')) return;
  delete checkState[currentOrder.id];
  saveCheckState();
  showGeneratedSketch(currentOrder);
  updateProgress();
  renderOrderList();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
loadOrders();
renderOrderList();
window.addEventListener('resize', ()=>{
  if(currentOrder) setupCanvas();
});
