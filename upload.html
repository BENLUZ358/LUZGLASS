<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuzGlass — העלאת סקיצה</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f4ef;--bg2:#ede9e1;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#1a1714;--muted:#8a8278;--gold:#b8922a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .logo-main{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--text);}
  .logo-main span{color:var(--gold);}
  .back-btn{padding:8px 16px;background:var(--bg2);border:1px solid var(--border);font-family:'Heebo',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:none;display:inline-block;}

  .page{max-width:560px;margin:0 auto;padding:28px 20px 60px;}

  .page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
  .page-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}

  /* UPLOAD ZONE */
  .upload-zone{
    border:2px dashed rgba(184,146,42,0.4);
    background:rgba(184,146,42,0.03);
    padding:40px 20px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s;
    margin-bottom:16px;
    position:relative;
  }
  .upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(184,146,42,0.07);}
  .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .uz-icon{font-size:44px;margin-bottom:12px;}
  .uz-title{font-size:16px;font-weight:700;margin-bottom:6px;}
  .uz-sub{font-size:13px;color:var(--muted);}
  .uz-types{font-size:11px;color:var(--muted);margin-top:8px;opacity:0.7;}

  /* PREVIEW */
  .preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .preview-item{position:relative;aspect-ratio:1;background:var(--bg2);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;}
  .preview-item img{width:100%;height:100%;object-fit:cover;}
  .preview-item .rm{position:absolute;top:4px;left:4px;width:22px;height:22px;background:rgba(192,57,43,0.85);color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .preview-count{font-size:12px;color:var(--muted);margin-bottom:16px;text-align:center;}

  /* FORM */
  .form-section{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase;}
  .field input,.field select,.field textarea{
    padding:12px 14px;background:var(--surface);
    border:1px solid var(--border);
    font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);
    outline:none;transition:border-color 0.15s;
    -webkit-appearance:none;border-radius:0;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
  .field textarea{resize:none;line-height:1.6;}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* SUBMIT */
  .btn-submit{
    width:100%;padding:16px;
    background:var(--gold);color:#fff;
    font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;
    border:none;cursor:pointer;letter-spacing:0.04em;
    transition:background 0.2s;
  }
  .btn-submit:hover{background:#9a7520;}
  .btn-submit:disabled{background:#ccc;cursor:not-allowed;}

  /* SUCCESS */
  .success-screen{
    display:none;text-align:center;
    padding:60px 20px;
  }
  .success-screen.show{display:block;}
  .success-icon{font-size:64px;margin-bottom:20px;}
  .success-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:10px;}
  .success-sub{font-size:15px;color:var(--muted);line-height:1.7;max-width:340px;margin:0 auto 32px;}
  .success-ref{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:28px;}
  .btn-back{display:inline-block;padding:14px 32px;background:var(--text);color:var(--bg);font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;text-decoration:none;}
</style>
  <!-- Firebase SDK + LuzGlass DB -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-db.js"></script>
</head>
<body>

<div class="topbar">
  <div class="logo-main" onclick="logoClick()" style="cursor:pointer;">Luz<span>Glass</span></div>
  <a href="portal.html" class="back-btn">→ חזרה לפורטל</a>
</div>

<div class="page" id="formPage">
  <div class="page-title">העלאת סקיצה</div>
  <div class="page-sub">העלה תמונה של שרטוט ידני, מדידות, או כל קובץ רלוונטי — ואנחנו נטפל בזה.</div>

  <!-- UPLOAD ZONE -->
  <!-- File input ישירות בתוך ה-zone — תואם iOS Safari -->
  <label for="fileInput" class="upload-zone" id="dropZone" style="display:block;cursor:pointer;">
  <input type="file" id="fileInput" accept="image/*,.pdf" multiple
    style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;"
    onchange="handleFiles(this.files)">
    <div class="uz-icon">📎</div>
    <div class="uz-title">לחץ לבחירת קבצים</div>
    <div class="uz-sub">תמונות של שרטוטים, מדידות, רפרנסים</div>
    <div class="uz-types">JPG, PNG, PDF · עד 10MB לקובץ</div>
    <div style="margin-top:14px;">
      <span style="display:inline-block;padding:10px 24px;background:var(--gold);color:#fff;font-family:Heebo,sans-serif;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;">
        📂 בחר קובץ
      </span>
    </div>
  </label>

  <div class="preview-grid" id="previewGrid" style="display:none"></div>
  <div class="preview-count" id="previewCount"></div>

  <!-- FORM -->
  <div class="form-section">
    <div class="field">
      <label>הערות כלליות</label>
      <textarea id="notes" rows="3" placeholder="מידות, סוג זכוכית מבוקש, פרזול, הערות מיוחדות..."></textarea>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" type="button" onclick="submitUpload()" style="width:100%;min-height:50px;font-size:16px;">שלח סקיצה ←</button>
</div>

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">הסקיצה נשלחה!</div>
  <div class="success-sub">קיבלנו את הסקיצה שלך ונטפל בה בהקדם. ניצור איתך קשר לאישור.</div>
  <div class="success-ref" id="successRef"></div>
  <a href="portal.html" class="btn-back">→ חזרה לפורטל</a>
</div>

<script>
// Read session for client name
const _sess = JSON.parse(sessionStorage.getItem('lgSession')||'{}');
const _clientName = _sess.name || '';
const _clientPhone = _sess.phone || '';
// Pre-fill client name if logged in
if(_clientName) {
  const cnEl = document.getElementById('clientName');
  if(cnEl) cnEl.value = _clientName;
}

let uploadedFiles = [];

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if(file.size > 10 * 1024 * 1024) { alert(`הקובץ ${file.name} גדול מ-10MB`); return; }
    const reader = new FileReader();
    reader.onload = e => {
      uploadedFiles.push({ name: file.name, data: e.target.result, type: file.type });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  const count = document.getElementById('previewCount');
  if (!uploadedFiles.length) { grid.style.display = 'none'; count.textContent = ''; return; }
  grid.style.display = 'grid';
  grid.innerHTML = uploadedFiles.map((f, i) => `
    <div class="preview-item" style="display:flex;flex-direction:column;">
      <div style="flex:1;position:relative;overflow:hidden;min-height:0;">
        ${f.type.startsWith('image')
          ? `<img src="${f.data}" alt="${f.name}" style="width:100%;height:100%;object-fit:cover;">`
          : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;">📄</div>`}
        <button class="rm" onclick="removeFile(${i})">✕</button>
      </div>
      <input
        type="text"
        placeholder="שם סקיצה..."
        value="${(f.sketchName||'').replace(/"/g,'&quot;')}"
        oninput="uploadedFiles[${i}].sketchName=this.value"
        onclick="event.stopPropagation()"
        style="flex-shrink:0;width:100%;padding:6px 8px;font-size:12px;font-family:Heebo,sans-serif;border:none;border-top:1px solid rgba(0,0,0,0.12);background:#fff;color:#1a1714;outline:none;text-align:center;direction:rtl;box-sizing:border-box;">
    </div>`).join('');
  count.textContent = `${uploadedFiles.length} קבצים נבחרו`;
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderPreviews();
}

function compressImage(dataUrl, maxW, quality, cb){
  const img = new Image();
  img.onload = function(){
    const canvas = document.createElement('canvas');
    const scale = Math.min(1, maxW / img.width);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = function(){ cb(dataUrl); }; // fallback
  img.src = dataUrl;
}

async function submitUpload() {
  const sess = JSON.parse(sessionStorage.getItem('lgSession') || '{}');
  const name = sess.name || sess.id || 'לקוח';
  const phone = sess.phone || '';
  const notes = document.getElementById('notes').value.trim();

  if (!uploadedFiles.length) { alert('נא להעלות לפחות קובץ אחד'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'מעבד...';

  const refNum = 'UPL-' + Date.now().toString().slice(-6);
  const now = new Date();
  const dateStr = now.toLocaleDateString('he-IL');
  const timeStr = now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});

  // דחוס כל תמונה לפני שמירה (פותר בעיית iOS/נפח)
  let processed = 0;
  const compressed = [];

  // שמור ל-Firebase — כל קובץ כ-submission נפרד
  async function saveAll(){
    try {
      for (let i = 0; i < compressed.length; i++) {
        const fileSketchName = (uploadedFiles[i].sketchName || '').trim() || ('סקיצה ' + (i + 1));
        await saveSubmission({
          refNum:     refNum + (compressed.length > 1 ? '-' + (i + 1) : ''),
          orderClient: name,
          client:     name,
          phone,
          sketchName: fileSketchName,
          orderNum:   refNum + (compressed.length > 1 ? '-' + (i + 1) : ''),
          notes,
          read:       false,
          files:      [{ name: compressed[i].name, data: compressed[i].data, type: 'image/jpeg' }],
          date:       dateStr,
          time:       timeStr
        });
      }
    } catch(e) {
      console.error('[upload] Firebase error:', e.message);
      alert('שגיאה בשמירה — בדוק חיבור ונסה שוב');
      btn.disabled = false;
      btn.textContent = 'שלח סקיצה ←';
      return;
    }

    document.getElementById('formPage').style.display = 'none';
    document.getElementById('successScreen').classList.add('show');
    document.getElementById('successRef').textContent = 'מספר פנייה: ' + refNum;
  }

  uploadedFiles.forEach((f, i) => {
    if(f.type && f.type.startsWith('image/')){
      compressImage(f.data, 1000, 0.6, function(compData){
        compressed[i] = {name: f.name, data: compData};
        processed++;
        if(processed === uploadedFiles.length) saveAll();
      });
    } else {
      compressed[i] = {name: f.name, data: f.data};
      processed++;
      if(processed === uploadedFiles.length) saveAll();
    }
  });
}

// Session auto-detected — no need to pre-fill

function logoClick(){
  const sess=JSON.parse(sessionStorage.getItem('lgSession')||'{}');
  if(sess.role==='admin') window.location.href='admin.html';
  else if(sess.role==='client') window.location.href='portal.html';
  else window.location.href='login.html';
}
</script>
</body>
</html>
